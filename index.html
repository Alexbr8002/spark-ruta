<style>
:root{--bg:#0F1420;--surf:#1A2233;--surf2:#232E44;--line:#2C3852;--tx:#EAF0FF;--mut:#8C9BB8;--acc:#FFD23F;--ok:#34D399;--sp:#FB7185;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased}
#app{max-width:560px;margin:0 auto;min-height:100vh;padding-bottom:96px}
.head{padding:16px 16px 12px;background:linear-gradient(180deg,#141B2B,#0F1420);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
.head-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.kicker{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--acc);font-weight:800}
.store{font-size:20px;font-weight:800;margin-top:2px}
.entrada{font-size:11px;color:var(--mut);text-align:right;line-height:1.3;max-width:110px;border:1px solid var(--line);border-radius:8px;padding:5px 7px}
.prog{display:flex;align-items:center;gap:10px;margin-top:12px}
.prog-bar{flex:1;height:8px;background:var(--surf2);border-radius:99px;overflow:hidden}
.prog-bar>span{display:block;height:100%;background:var(--ok);transition:width .3s}
.prog-txt{font-size:12px;color:var(--mut);font-weight:600;white-space:nowrap}
.steps{display:flex;gap:6px;padding:12px 16px}
.step{flex:1;background:var(--surf);border:1px solid var(--line);color:var(--mut);padding:9px 4px;border-radius:10px;font-size:12px;font-weight:700}
.step.on{background:var(--acc);color:#1A1300;border-color:var(--acc)}
.pad{padding:4px 16px 24px}
.lead{color:var(--mut);font-size:14px;line-height:1.5;margin:8px 0 18px}
.big{width:100%;background:var(--acc);color:#1A1300;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:800;margin:4px 0}
.ghost{width:100%;background:var(--surf);color:var(--tx);border:1px solid var(--line);border-radius:12px;padding:13px;font-size:14px;font-weight:700;margin:4px 0}
.ghost.sm{width:auto;flex:1;padding:10px;font-size:13px}
.opt{background:var(--surf);border:1px solid var(--line);border-radius:14px;padding:14px;margin:0 0 12px}
.opt-h{font-size:13px;font-weight:800;margin-bottom:10px}
.file{width:100%;background:var(--surf2);border:1px dashed var(--mut);color:var(--tx);border-radius:10px;padding:14px 12px;font-size:14px}
.file::file-selector-button{background:var(--acc);color:#1A1300;border:none;border-radius:8px;padding:9px 14px;font-weight:800;font-size:13px;margin-right:12px}
.status{margin-top:10px;background:rgba(255,210,63,.12);border:1px solid var(--acc);color:#FFE9A6;padding:10px 12px;border-radius:10px;font-size:13px;font-weight:600}
.error{margin-top:10px;background:rgba(251,113,133,.12);border:1px solid var(--sp);color:#FFD7DE;padding:10px 12px;border-radius:10px;font-size:13px}
.hint{color:var(--mut);font-size:12px;margin:10px 0 6px}
.hint code{background:var(--surf2);padding:2px 6px;border-radius:5px;color:var(--acc);font-size:11px}
.ta{width:100%;background:var(--surf);border:1px solid var(--line);color:var(--tx);border-radius:10px;padding:10px;font-size:13px;font-family:ui-monospace,monospace;resize:vertical}
.row-btns{display:flex;gap:8px;margin:10px 0}
.empty{color:var(--mut);text-align:center;padding:40px 20px;font-size:14px}
.in{background:var(--surf2);border:1px solid var(--line);color:var(--tx);border-radius:8px;padding:8px;font-size:13px;width:100%}
.edit{background:var(--surf);border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:10px}
.edit.sp{border-color:var(--sp)}
.in.name{margin-bottom:8px;font-weight:600}
.edit-row{display:flex;gap:6px;align-items:flex-end}
.edit-row label{font-size:10px;color:var(--mut);font-weight:700;text-transform:uppercase;flex:1}
.edit-row label:first-child{flex:1.4}
.del{background:transparent;border:1px solid var(--line);color:var(--sp);border-radius:8px;width:38px;height:36px;font-size:14px;flex:none}
.tag-sp{color:var(--sp);font-size:12px;font-weight:700;margin-top:8px}
.client-row{display:flex;align-items:center;gap:6px;margin-top:8px}
.client-lbl{font-size:10px;color:var(--mut);font-weight:700;text-transform:uppercase;margin-right:2px}
.client-btn{width:34px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--surf2);color:var(--mut);font-weight:800;font-size:13px}
.client-btn.clr{color:var(--sp)}
.summary{display:flex;gap:8px;margin:6px 0 16px}
.summary>div{flex:1;background:var(--surf);border:1px solid var(--line);border-radius:12px;padding:12px 8px;text-align:center}
.summary b{display:block;font-size:22px;font-weight:800;color:var(--acc)}
.summary span{font-size:11px;color:var(--mut);text-transform:uppercase}
.aisle{background:var(--surf);border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden}
.aisle.done{opacity:.5}.aisle.sp{border-color:var(--sp)}
.aisle-head{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--surf2)}
.aisle-id{display:flex;align-items:center;gap:10px}
.step-no{background:var(--bg);color:var(--mut);width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
.aisle-code{font-size:22px;font-weight:800;color:var(--acc)}
.aisle.sp .aisle-code{color:var(--sp)}
.aisle-meta{text-align:right}
.zone{font-size:12px;color:var(--mut);font-weight:600}
.count{font-size:12px;font-weight:700}
.item{display:flex;align-items:center;gap:11px;padding:12px 14px;background:transparent;border:none;border-top:1px solid var(--line);text-align:left;width:100%;color:var(--tx)}
.check{width:26px;height:26px;border:2px solid var(--line);border-radius:8px;flex:none;display:flex;align-items:center;justify-content:center;color:var(--ok);font-weight:900}
.item.done .check{background:var(--ok);border-color:var(--ok);color:#04241A}
.item-body{display:flex;flex-direction:column;gap:3px;min-width:0}
.item-name{font-size:14px;font-weight:600;line-height:1.3}
.item.done .item-name{text-decoration:line-through;color:var(--mut)}
.item-sub{display:flex;gap:8px;flex-wrap:wrap}
.item-sub em{font-style:normal;font-size:11px;color:var(--mut);background:var(--surf2);padding:2px 7px;border-radius:6px;font-weight:700}
.cl{font-style:normal;font-size:11px;font-weight:800;padding:2px 7px;border-radius:6px}
.frio{color:#7CC8FF!important}
.sp-head{color:var(--sp);font-weight:800;font-size:13px;margin:18px 0 10px;border-top:1px dashed var(--sp);padding-top:14px}
.foot{text-align:center;color:var(--mut);font-size:13px;font-weight:600;margin:18px 0}
.zone-card{background:var(--surf);border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden}
.zone-h{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surf2)}
.zone-icon{font-size:20px;color:var(--acc)}
.zone-title{font-size:15px;font-weight:800}.zone-hint{font-size:11px;color:var(--mut);font-weight:600}
.zone-n{margin-left:auto;background:var(--bg);font-weight:800;font-size:13px;min-width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.zone-empty{padding:14px;color:var(--mut);text-align:center}
.zone-item{display:flex;align-items:center;gap:9px;padding:10px 14px;border-top:1px solid var(--line)}
.zone-name{font-size:13px;font-weight:600;flex:1;min-width:0}
.zone-qty{font-size:11px;color:var(--mut);font-weight:700;background:var(--surf2);padding:2px 7px;border-radius:6px}
.cfg{position:fixed;bottom:0;left:0;right:0;max-width:560px;margin:0 auto;background:#0C1119;border-top:1px solid var(--line)}
.cfg-toggle{width:100%;background:transparent;border:none;color:var(--mut);padding:13px;font-size:13px;font-weight:700;text-align:left}
.cfg-body{padding:0 16px 14px;max-height:55vh;overflow:auto}
.sp-edit{display:flex;gap:6px;align-items:flex-end;margin-bottom:8px}
.sp-edit label{font-size:10px;color:var(--mut);font-weight:700;flex:1}
.sp-edit label:first-child{flex:1.6}
/* OOS */
.oos-new{display:block;width:100%;background:transparent;border:2px dashed var(--acc);color:var(--acc);border-radius:14px;padding:16px;font-size:14px;font-weight:800;margin-bottom:14px;text-align:center;cursor:pointer}
.oos-card{background:var(--surf);border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden;cursor:pointer}
.oos-card.open{border-color:rgba(255,210,63,.5)}
.oos-card.closed{opacity:.55}
.oos-card-h{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--surf2)}
.oos-item-name{font-size:14px;font-weight:800;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.oos-badge{font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;white-space:nowrap;margin-left:8px}
.oos-badge.open{background:rgba(255,210,63,.2);color:var(--acc)}
.oos-badge.closed{background:rgba(52,211,153,.15);color:var(--ok)}
.oos-back{background:transparent;border:none;color:var(--mut);font-size:13px;font-weight:700;padding:0;margin-bottom:14px;cursor:pointer}
.msg-box{background:var(--surf2);border:1px solid var(--line);border-radius:10px;padding:12px;margin:6px 0;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.copy-btn{background:transparent;border:1px solid var(--acc);color:var(--acc);border-radius:8px;padding:7px 16px;font-size:12px;font-weight:800;margin-top:6px;cursor:pointer}
.fallback-box{background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.25);border-radius:10px;padding:10px 12px;margin:6px 0;font-size:13px;color:var(--ok);line-height:1.5}
.thread-msg{border-radius:10px;padding:10px 12px;margin:7px 0;font-size:13px;line-height:1.5}
.thread-msg.customer{background:rgba(124,200,255,.07);border:1px solid rgba(124,200,255,.25)}
.thread-msg.suggestion{background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.25);color:var(--ok)}
.thread-role{font-size:10px;font-weight:800;text-transform:uppercase;color:var(--mut);margin-bottom:4px}
.section-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);margin:16px 0 6px}
</style>

function parseAisle(code){var m=String(code||"").trim().toUpperCase().match(/^([A-Z]+)\s*(\d+)?$/);if(!m)return{prefix:String(code||"").toUpperCase(),num:null};return{prefix:m[1],num:m[2]!=null?parseInt(m[2],10):null};}
function baseSeq(p,n){if(p==="A"&&n!=null)return 200+n;if(p==="AC")return 233+(n||0)/1000;if(p==="AB")return 234+(n||0)/1000;if(p==="AD")return 235+(n||0)/1000;if(p==="AP")return 235.5+(n||0)/1000;if(ZONE_BASE[p]!=null)return ZONE_BASE[p]+(n!=null?n/100:0);if(p==="Z")return 900+(n||0)/100;return 500;}
function sectionDir(p,n){if(p==="A"&&n!=null&&n<=29&&n%2===1){var v=(n-1)/2;return v%2===0?1:-1;}return 1;}
function zoneOf(p){if(["A","AP","AB","AD","AC"].indexOf(p)>=0)return p==="A"?"A":p;return p;}

function buildRoute(items,specials){var en=items.map(function(it,i){var pa=parseAisle(it.aisle);var sp=isSpecial(it,specials);return Object.assign({},it,{_i:i,prefix:pa.prefix,num:pa.num,seq:baseSeq(pa.prefix,pa.num)+(sp?9000:0),special:sp});});var g={};en.forEach(function(it){var k=String(it.aisle||"?").toUpperCase();if(!g[k])g[k]={aisle:k,prefix:it.prefix,num:it.num,seq:it.seq,special:it.special,items:[]};g[k].items.push(it);});var arr=Object.keys(g).map(function(k){return g[k];}).sort(function(a,b){return a.seq-b.seq;});arr.forEach(function(gr){var d=sectionDir(gr.prefix,gr.num);gr.items.sort(function(x,y){return d*((x.section==null?0:x.section)-(y.section==null?0:y.section));});});return arr;}

function parseSize(name){var n=(name||"").toLowerCase(),bulk=1,heavy=false,large=false,fragile=false,m;
m=n.match(/(\d+(?:\.\d+)?)\s*(?:lb|lbs|pound)/);if(m){var v=parseFloat(m[1]);bulk=Math.max(bulk,v/10);if(v>=15){heavy=true;large=true;}}
if(/\bgallon\b|\bgal\b/.test(n)){bulk=Math.max(bulk,5);large=true;}
m=n.match(/(\d+)\s*(?:count|ct|pack|pk|bottles?)/);if(m){var c=parseInt(m[1],10);if(c>=12){bulk=Math.max(bulk,3);large=true;}if(c>=24)heavy=true;}
m=n.match(/(\d+(?:\.\d+)?)\s*fl\s*oz/);if(m){var f=parseFloat(m[1]);bulk=Math.max(bulk,f/40);if(f>=60)large=true;if(f<3)fragile=true;}
else{m=n.match(/(\d+(?:\.\d+)?)\s*oz/);if(m){var o=parseFloat(m[1]);bulk=Math.max(bulk,o/32);if(o<3)fragile=true;}}
return{bulk:bulk,heavy:heavy,large:large,fragile:fragile};}
function itemBulk(it){return parseSize(it.name).bulk*(Number(it.qty)||1);}
function itemClass(it){var s=parseSize(it.name),tb=s.bulk*(Number(it.qty)||1);if(s.heavy||tb>=6)return"heavy";if(s.fragile&&!s.large)return"fragile";if(tb<=1.5)return"small";return"medium";}
function suggestCart(items){var zones={grande:[],canasta:[],rejilla:[]};if(!items.length)return{mode:"single",zones:zones};var groups={};items.forEach(function(it){var c=(it.client||"").toUpperCase()||"—";(groups[c]=groups[c]||[]).push(it);});var labels=Object.keys(groups).filter(function(c){return c!=="—";});
if(labels.length<=1){items.forEach(function(it){var cls=itemClass(it);if(cls==="heavy")zones.rejilla.push(it);else if(cls==="fragile"||cls==="small")zones.canasta.push(it);else zones.grande.push(it);});return{mode:"single",zones:zones};}
var totals=Object.keys(groups).map(function(c){return{c:c,its:groups[c],bulk:groups[c].reduce(function(s,i){return s+itemBulk(i);},0)};}).sort(function(a,b){return b.bulk-a.bulk;});var big=totals[0];big.its.forEach(function(it){zones.grande.push(it);});totals.slice(1).forEach(function(t){t.its.forEach(function(it){var cls=itemClass(it);if(cls==="heavy")zones.rejilla.push(it);else zones.canasta.push(it);});});return{mode:"multi",zones:zones,bigClient:big.c};}

function fileToB64(file){return new Promise(function(res,rej){var r=new FileReader();r.onload=function(){res(String(r.result).split(",")[1]);};r.onerror=function(){rej(new Error("no se pudo leer la imagen"));};r.readAsDataURL(file);});}
function extractFromImages(files){
  if(!S.apiKey){return Promise.reject(new Error("falta tu clave de API (ábrela en Ajustes ⚙)"));}
  return Promise.all(Array.prototype.map.call(files,function(f){return fileToB64(f).then(function(d){return{type:"image",source:{type:"base64",media_type:(f.type&&f.type.indexOf("image/")===0)?f.type:"image/jpeg",data:d}};});})).then(function(imgs){
    var prompt='Eres un extractor de pedidos de Walmart Spark. De estas capturas devuelve SOLO un arreglo JSON, sin texto ni markdown. Cada elemento: {"name":string,"aisle":string (ej "A31","AB5","H11","AC4"),"section":number|null,"modular":number|null,"qty":number,"perishable":boolean,"client":"A"|"B"|"C"|null}. Si junto al item hay etiqueta de cliente (A,B,C) ponla en client; si no, null. Usa el Aisle exacto. No inventes items.';
    var body={model:S.model,max_tokens:1200,messages:[{role:"user",content:imgs.concat([{type:"text",text:prompt}])}]};
    return fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"content-type":"application/json","x-api-key":S.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify(body)}).then(function(resp){
      if(!resp.ok){return resp.json().catch(function(){return null;}).then(function(ej){var d="HTTP "+resp.status;if(ej&&ej.error&&ej.error.message)d+=" · "+ej.error.message;throw new Error(d);});}
      return resp.json();
    }).then(function(data){
      if(data&&data.error)throw new Error(data.error.message||"error de la IA");
      var text=(data.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("\n");
      var clean=text.replace(/```json/gi,"").replace(/```/g,"").trim();var a=clean.indexOf("["),b=clean.lastIndexOf("]");var js=(a>=0&&b>=0)?clean.slice(a,b+1):clean;var arr;try{arr=JSON.parse(js);}catch(e){throw new Error("respuesta no entendible de la IA");}if(!Array.isArray(arr))arr=[];
      return arr.map(function(x){return{name:x.name||"Item",aisle:(x.aisle||"").toString().toUpperCase().replace(/\s+/g,""),section:x.section==null?null:x.section,modular:x.modular==null?null:x.modular,qty:x.qty?Number(x.qty):1,perishable:!!x.perishable,client:x.client?String(x.client).toUpperCase().replace(/[^ABC]/g,"")||null:null,done:false};});
    });
  });
}

function apiJson(body){
  return fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"content-type":"application/json","x-api-key":S.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify(body)})
  .then(function(r){if(!r.ok)return r.json().catch(function(){return null;}).then(function(e){throw new Error("HTTP "+r.status+(e&&e.error?" · "+e.error.message:""));});return r.json();})
  .then(function(d){if(d&&d.error)throw new Error(d.error.message||"error IA");var t=(d.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("");var clean=t.replace(/```json/gi,"").replace(/```/g,"").trim();var a=clean.indexOf("{"),b=clean.lastIndexOf("}");return JSON.parse((a>=0&&b>=0)?clean.slice(a,b+1):clean);});}
function startOOS(files){
  if(!files||!files.length)return;
  if(!S.apiKey){S.oosError="Falta clave de API (abre Ajustes ⚙)";render();return;}
  S.oosStatus="Analizando imágenes…";S.oosError="";render();
  Promise.all(Array.prototype.slice.call(files,0,2).map(function(f){return fileToB64(f).then(function(d){return{type:"image",source:{type:"base64",media_type:(f.type&&f.type.indexOf("image/")===0)?f.type:"image/jpeg",data:d}};});}))
  .then(function(imgs){
    var prompt='You help a Walmart Spark driver handle out-of-stock items. Image 1: Spark app screenshot showing the out-of-stock item. Image 2: store shelf photo with possible substitutes. Return ONLY a JSON object, no markdown:\n{"itemName":string,"alternatives":[string,...],"customerMessage":string,"fallback":string}\ncustomerMessage: friendly English message to the customer — (1) apologize the item is out of stock, (2) list each alternative from the shelf with a very brief description, (3) ask which they prefer or if they want to skip it. Keep it conversational and concise.\nfallback: what to do if no reply in ~5 min — either "No substitution — skip the item" or "Substitute with [exact product name]: [one sentence why it is a good match]".';
    return apiJson({model:S.model,max_tokens:1000,messages:[{role:"user",content:imgs.concat([{type:"text",text:prompt}])}]});
  })
  .then(function(p){
    var chat={id:Date.now(),itemName:p.itemName||"Item",alternatives:p.alternatives||[],customerMsg:p.customerMessage||"",fallback:p.fallback||"",thread:[],closed:false,closedWith:null};
    S.oosChats.unshift(chat);S.oosActive=0;S.oosStatus="";save();render();
  })
  .catch(function(err){S.oosStatus="";S.oosError="Error: "+(err.message||"error");render();});
}
function replyOOS(chatIdx,file){
  var chat=S.oosChats[chatIdx];if(!chat)return;
  S.oosStatus="Leyendo respuesta del cliente…";S.oosError="";render();
  fileToB64(file).then(function(d){
    var img={type:"image",source:{type:"base64",media_type:(file.type&&file.type.indexOf("image/")===0)?file.type:"image/jpeg",data:d}};
    var ctx="Out-of-stock item: "+chat.itemName+"\nAlternatives offered: "+chat.alternatives.join(", ")+"\nMessage sent to customer: "+chat.customerMsg;
    if(chat.thread.length){ctx+="\nConversation so far:\n";chat.thread.forEach(function(t){ctx+=(t.role==="customer"?"Customer: ":"Suggestion: ")+t.text+"\n";});}
    var prompt=ctx+'\n\nThis screenshot is the customer\'s reply. Read it carefully. Return ONLY JSON (no markdown):\n{"customerSaid":string,"nextAction":string,"actionType":"substitute"|"no_substitute"|"ask_again"|"done"}\ncustomerSaid: what the customer wrote (paraphrased if needed). nextAction: exact next step for the driver (e.g. a specific message to send back, or "Mark as substituted with [X]" or "Mark item as refunded"). actionType: substitute=pick a specific item and mark it; no_substitute=skip/refund; ask_again=customer is unclear, send a follow-up; done=decision confirmed, conversation can close.';
    return apiJson({model:S.model,max_tokens:600,messages:[{role:"user",content:[img,{type:"text",text:prompt}]}]});
  })
  .then(function(p){
    var chat=S.oosChats[chatIdx];
    chat.thread.push({role:"customer",text:p.customerSaid||""});
    chat.thread.push({role:"suggestion",text:p.nextAction||"",actionType:p.actionType||""});
    S.oosStatus="";save();render();
  })
  .catch(function(err){S.oosStatus="";S.oosError="Error: "+(err.message||"error");render();});
}
function closeOOS(chatIdx,decision){
  var chat=S.oosChats[chatIdx];if(!chat)return;
  chat.closed=true;chat.closedWith=decision||"Decisión cerrada";
  S.oosActive=null;save();render();
}

function renderOOSChat(main,idx){

  main.appendChild(h('<div class="section-title">Mensaje para el cliente</div>'));
  main.appendChild(h('<div class="msg-box">'+esc(chat.customerMsg)+'</div>'));

  cpBtn.onclick=function(){
    var txt=chat.customerMsg;
    if(navigator.clipboard){navigator.clipboard.writeText(txt).then(function(){cpBtn.textContent="✓ Copiado";setTimeout(function(){cpBtn.textContent="Copiar mensaje";},2000);});}
    else{var ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();try{document.execCommand("copy");cpBtn.textContent="✓ Copiado";setTimeout(function(){cpBtn.textContent="Copiar mensaje";},2000);}catch(e){}document.body.removeChild(ta);}
  };
  main.appendChild(cpBtn);

    main.appendChild(h('<div class="section-title">Conversación</div>'));

    });
  }

    main.appendChild(h('<div class="section-title">Respuesta del cliente</div>'));

    if(S.oosError){var er=h('<div class="error">'+esc(S.oosError)+'</div>');er.onclick=function(){S.oosError="";render();};main.appendChild(er);}
    main.appendChild(h('<div class="section-title">Cerrar decisión</div>'));

    var bs=h('<button class="ghost sm">✓ Sustituir</button>');bs.onclick=function(){closeOOS(idx,lastSug?lastSug.text:"Sustituido según sugerencia");};
    var bn=h('<button class="ghost sm">✗ Omitir item</button>');bn.onclick=function(){closeOOS(idx,"No sustituir — item omitido");};
    var bf=h('<button class="ghost sm">⏱ Aplicar fallback</button>');bf.onclick=function(){closeOOS(idx,chat.fallback||"Fallback aplicado");};
    dr.appendChild(bs);dr.appendChild(bn);dr.appendChild(bf);main.appendChild(dr);
  } else {

  }
}

function renderGate(main){
  main.appendChild(h('<p class="lead">Busca por dirección o nombre del condo.</p>'));
  
  /* Búsqueda unificada */
  var si=h('<input class="in" type="search" placeholder="Ej: Senna Ave, Arlington, Southern Highlands…" style="font-size:15px;padding:12px;margin-bottom:4px" autocomplete="off">');
  main.appendChild(si);
  
  var hint=h('<p class="hint">'+(GATE_CODES.length+S.gateCodesCustom.length)+' códigos ('+(GATE_CODES.length)+' base + '+S.gateCodesCustom.length+' personalizados)</p>');
  main.appendChild(hint);
  
  var results=h('<div></div>');
  main.appendChild(results);
  
  function fuzzyMatch(q,text){return text.toLowerCase().indexOf(q.toLowerCase())>=0;}
  
  function doSearch(){
    var q=(si.value||"").trim();
    results.innerHTML="";
    if(!q){return;}
    
    /* Merge custom + base */
    var allCodes=S.gateCodesCustom.concat(GATE_CODES);
    var hits=allCodes.filter(function(g){
      return fuzzyMatch(q,g.condo)||fuzzyMatch(q,g.calle)||(g.address?fuzzyMatch(q,g.address):"")||(g.customer?fuzzyMatch(q,g.customer):"")||(g.complex?fuzzyMatch(q,g.complex):"");
    });
    
    if(!hits.length){results.appendChild(h('<div class="empty" style="padding:24px 0">Sin resultados para "'+esc(si.value)+'"</div>'));return;}
    
    hits.forEach(function(g){
      var isCustom=S.gateCodesCustom.indexOf(g)>=0;
      var card=h('<div style="background:var(--surf);border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden"></div>');
      var head=h('<div style="background:var(--surf2);padding:11px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px"></div>');
      head.appendChild(h('<span style="font-size:14px;font-weight:800;flex:1;min-width:0">'+esc(g.condo)+(isCustom?' <span style="font-size:10px;color:var(--acc)">●</span>':'')+' </span>'));
      head.appendChild(h('<span style="font-size:24px;font-weight:900;color:var(--acc);letter-spacing:.04em;white-space:nowrap">'+esc(g.code)+'</span>'));
      card.appendChild(head);
      card.appendChild(h('<div style="padding:7px 14px 10px;font-size:12px;color:var(--mut)">📍 '+esc(g.calle)+' '+(g.address?'<br>'+esc(g.address):'')+'</div>'));
      results.appendChild(card);
    });
  }
  
  si.oninput=doSearch;
  
  /* Botón para agregar códigos */
  main.appendChild(h('<hr style="border:none;border-top:1px dashed var(--line);margin:20px 0;opacity:.5">'));
  main.appendChild(h('<div class="section-title">Agregar códigos personalizados</div>'));
  main.appendChild(h('<p class="hint">Sube captura de Spark con dirección y código de acceso.</p>'));
  
  var fileInput=h('<input class="file" type="file" accept="image/*">');
  fileInput.onchange=function(e){onAddGateCode(e.target);};
  main.appendChild(fileInput);
  
  var addStatus=h('<div></div>');
  main.appendChild(addStatus);
  
  /* Listar custom codes */
  if(S.gateCodesCustom.length){
    main.appendChild(h('<div class="section-title" style="margin-top:24px">Tus códigos ('+S.gateCodesCustom.length+')</div>'));
    S.gateCodesCustom.forEach(function(g,idx){
      var card=h('<div style="background:var(--surf);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;gap:10px;align-items:center"></div>');
      var info=h('<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700">'+esc(g.condo)+'</div><div style="font-size:11px;color:var(--mut)">'+esc(g.calle)+'</div><div style="font-size:12px;color:var(--acc);font-weight:800;margin-top:4px">'+esc(g.code)+'</div></div>');
      card.appendChild(info);
      var del=h('<button style="background:transparent;border:none;color:var(--sp);font-size:16px;cursor:pointer;padding:6px">✕</button>');
      del.onclick=function(){S.gateCodesCustom.splice(idx,1);save();render();};
      card.appendChild(del);
      main.appendChild(card);
    });
    
    var exp=h('<button class="ghost sm" style="width:100%;margin-top:12px">📥 Exportar CSV</button>');
    exp.onclick=function(){exportGateCodesCSV();};
    main.appendChild(exp);
  }
  
  setTimeout(function(){si.focus();},50);
  
  /* Handler para agregar código */
  function onAddGateCode(input){
    var files=Array.prototype.slice.call(input.files||[]);
    if(!files.length){addStatus.innerHTML='<div class="error" style="margin-top:8px">Selecciona una imagen</div>';return;}
    addStatus.innerHTML='<div class="status" style="margin-top:8px">Analizando…</div>';
    
    fileToB64(files[0]).then(function(b64){
      var prompt='Extract from this Spark delivery screenshot: 1) "code" = the Access Code (e.g. 578459, #8329) — the digits shown under "Access Code". 2) "address" = the full street address including unit number (e.g. "8649 Horizon Wind Ave, Unit 103"). 3) "customer" = the customer name shown (e.g. "Galinda W."). 4) "condo" = apartment complex/building name ONLY if clearly shown, otherwise null. Return ONLY valid JSON: {"code":"578459","address":"8649 Horizon Wind Ave, Unit 103","customer":"Galinda W.","condo":null}. Code, address and customer are the most important.';
      var body={model:S.model,max_tokens:200,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:files[0].type||"image/jpeg",data:b64}},{type:"text",text:prompt}]}]};
      return fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"content-type":"application/json","x-api-key":S.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify(body)}).then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();});
    }).then(function(data){
      var txt=(data.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("").trim();
      var clean=txt.replace(/```json/gi,"").replace(/```/g,"").trim();
      var parsed=JSON.parse(clean);
      
      /* Requiere código + dirección. */
      if(!parsed.code||!parsed.address){addStatus.innerHTML='<div class="error" style="margin-top:8px">No encontré Access Code o dirección en la captura. Asegúrate de que ambos sean visibles.</div>';return;}
      
      /* Etiqueta: nombre del cliente (siempre está) + condo si existe */
      var label=parsed.customer||parsed.address.split(",")[0];
      
      /* Dedup por código + dirección */
      var exists=S.gateCodesCustom.some(function(g){return g.code===parsed.code&&g.address===parsed.address;});
      if(exists){addStatus.innerHTML='<div class="hint" style="margin-top:8px">✓ Este código ya existe.</div>';input.value="";return;}
      
      S.gateCodesCustom.push({condo:label,customer:parsed.customer||"",complex:parsed.condo||"",calle:parsed.address,address:parsed.address,code:parsed.code});
      save();
      addStatus.innerHTML='<div class="status" style="margin-top:8px">✓ Agregado: '+esc(label)+' → '+esc(parsed.code)+'</div>';
      input.value="";
      hint.textContent=(GATE_CODES.length+S.gateCodesCustom.length)+' códigos ('+(GATE_CODES.length)+' base + '+S.gateCodesCustom.length+' personalizados)';
      setTimeout(function(){render();},1200);
    }).catch(function(err){addStatus.innerHTML='<div class="error" style="margin-top:8px">Error: '+(err&&err.message?err.message:"error")+'</div>';});
  }
}

function exportGateCodesCSV(){
  var csv="Condo,Calle,Dirección,Código,Tipo\n";
  S.gateCodesCustom.forEach(function(g){
    csv+='"'+g.condo.replace(/"/g,'""')+'","'+g.calle.replace(/"/g,'""')+'","'+(g.address||"").replace(/"/g,'""')+'","'+g.code.replace(/"/g,'""')+'","Personal"\n';
  });
  var blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  var link=document.createElement("a");
  link.href=URL.createObjectURL(blob);
  link.download="gate-codes-"+new Date().toISOString().split("T")[0]+".csv";
  link.click();
}

/* ============ ETA Messages ============ */
function copyText(txt,btn,label){
  var restore=label||btn.textContent;
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(function(){btn.textContent="✓ Copiado";setTimeout(function(){btn.textContent=restore;},2000);});}
  else{var ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();try{document.execCommand("copy");btn.textContent="✓ Copiado";setTimeout(function(){btn.textContent=restore;},2000);}catch(e){}document.body.removeChild(ta);}
}
function getGreeting(){var hr=new Date().getHours();if(hr>=5&&hr<12)return"morning";if(hr>=12&&hr<18)return"afternoon";return"evening";}
function buildETA(g,m){return"Good "+g+"! Your Spark driver here. I should arrive in about "+m+" minute"+(m===1?"":"s")+". Thank you!";}

      var aiCard=h('<div style="background:var(--surf);border:1px solid var(--line);border-radius:12px;padding:12px"></div>');

        if(openOOS.length){ctx+=" Substitution situations during shopping: "+openOOS.map(function(c){var last=null;c.thread.forEach(function(t){if(t.role==="suggestion")last=t;});return'"'+c.itemName+'"'+(last?" → "+last.text:"");}).join("; ")+".";}

        .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
        .then(function(data){

}

function renderLoad(main){
  main.appendChild(h('<p class="lead">Sube las capturas de tu pedido de Spark y la app las lee. La primera vez, pon tu clave de IA en Ajustes (abajo).</p>'));
  var opt=h('<div class="opt"><div class="opt-h">Subir capturas (lee con IA)</div></div>');
  var fi=h('<input class="file" type="file" accept="image/*" multiple'+(S.loading?" disabled":"")+'>');
  fi.onchange=function(e){onPick(e.target);};
  opt.appendChild(fi);
  if(!S.apiKey)opt.appendChild(h('<p class="hint">⚠ Falta tu clave de IA. Ábrela en <b>Ajustes</b> abajo.</p>'));
  if(S.status)opt.appendChild(h('<div class="status">'+esc(S.status)+'</div>'));
  if(S.error)opt.appendChild(h('<div class="error">'+esc(S.error)+'</div>'));
  main.appendChild(opt);

  var ex=h('<button class="ghost">Cargar ejemplo (pedido Emily Y.)</button>');
  ex.onclick=function(){S.items=EXAMPLE.map(function(g){return Object.assign({},g,{done:false});});S.view="review";S.error="";save();render();};
  main.appendChild(ex);

  var opt2=h('<div class="opt"><div class="opt-h">Escribir / pegar lista (respaldo)</div><p class="hint">Una línea por item: <code>Nombre | Aisle | Sección | Cant | Cliente</code></p></div>');
  var ta=h('<textarea class="ta" rows="4" placeholder="Leche | A31 | 7 | 1 | A\nOreo | A24 | 1 | 1 | B"></textarea>');
  ta.value=S.bulk; ta.oninput=function(){S.bulk=ta.value;};
  opt2.appendChild(ta);
  var rb=h('<div class="row-btns"></div>');
  var ab=h('<button class="ghost sm">Agregar lista</button>');ab.onclick=parseBulk;
  var ib=h('<button class="ghost sm">Item en blanco</button>');ib.onclick=function(){addBlank();S.view="review";render();};
  rb.appendChild(ab);rb.appendChild(ib);opt2.appendChild(rb);
  main.appendChild(opt2);
}

function onPick(input){
  var files=Array.prototype.slice.call(input.files||[]);
  if(!files.length){S.status="No se seleccionó ninguna imagen.";render();return;}
  S.loading=true;S.error="";S.status="Recibí "+files.length+" imagen(es). Analizando con IA…";render();
  extractFromImages(files).then(function(got){
    S.loading=false;S.status="";
    if(!got.length){S.error="La IA no detectó items. Prueba capturas más nítidas.";}
    else{S.items=S.items.concat(got);S.view="review";save();}
    render();
  }).catch(function(err){
    S.loading=false;S.status="";S.error="Falló la lectura: "+(err&&err.message?err.message:"error")+". Revisa tu clave en Ajustes.";render();
  });
  try{input.value="";}catch(e){}
}

function parseBulk(){
  var lines=S.bulk.split("\n").map(function(l){return l.trim();}).filter(Boolean);
  var got=lines.map(function(l){var p=l.split("|").map(function(x){return x.trim();});return{name:p[0]||"Item",aisle:(p[1]||"").toUpperCase().replace(/\s+/g,""),section:p[2]?Number(p[2]):null,modular:null,qty:p[3]?Number(p[3]):1,perishable:false,client:p[4]?(p[4].toUpperCase().replace(/[^ABC]/g,"")||null):null,done:false};});
  if(got.length){S.items=S.items.concat(got);S.bulk="";S.view="review";save();render();}
}
function addBlank(){S.items.push({name:"",aisle:"",section:null,modular:null,qty:1,perishable:false,client:null,done:false});save();}

function renderReview(main,total){
  if(total===0){main.appendChild(h('<div class="empty">Aún no hay items. Ve a <b>Cargar</b>.</div>'));return;}
  main.appendChild(h('<p class="lead">Revisa lo extraído y corrige lo necesario antes de armar la ruta.</p>'));
  S.items.forEach(function(it,i){
    var sp=isSpecial(it,S.specials);
    var card=h('<div class="edit'+(sp?" sp":"")+'"></div>');
    var nm=h('<input class="in name" placeholder="Nombre del producto" value="'+esc(it.name)+'">');nm.oninput=function(){it.name=nm.value;save();};
    card.appendChild(nm);
    var row=h('<div class="edit-row"></div>');
    var la=h('<label>Aisle<input class="in" value="'+esc(it.aisle)+'"></label>');la.querySelector("input").oninput=function(e){it.aisle=e.target.value.toUpperCase().replace(/\s+/g,"");save();render();};
    var ls=h('<label>Sec<input class="in" type="number" value="'+(it.section==null?"":it.section)+'"></label>');ls.querySelector("input").oninput=function(e){it.section=e.target.value===""?null:Number(e.target.value);save();render();};
    var lq=h('<label>Cant<input class="in" type="number" value="'+it.qty+'"></label>');lq.querySelector("input").oninput=function(e){it.qty=Number(e.target.value);save();};
    var del=h('<button class="del">✕</button>');del.onclick=function(){S.items.splice(i,1);save();render();};
    row.appendChild(la);row.appendChild(ls);row.appendChild(lq);row.appendChild(del);card.appendChild(row);
    var cr=h('<div class="client-row"><span class="client-lbl">Cliente</span></div>');
    ["A","B","C"].forEach(function(c){var b=h('<button class="client-btn">'+c+'</button>');if(it.client===c){b.style.background=CLIENT_COLORS[c];b.style.color="#1A1300";b.style.borderColor=CLIENT_COLORS[c];}b.onclick=function(){it.client=it.client===c?null:c;save();render();};cr.appendChild(b);});
    card.appendChild(cr);
    if(sp)card.appendChild(h('<div class="tag-sp">🔒 Recoger en caja — irá al final</div>'));
    main.appendChild(card);
  });
  var rb=h('<div class="row-btns"></div>');
  var ai=h('<button class="ghost sm">+ Item</button>');ai.onclick=function(){addBlank();render();};
  var vc=h('<button class="ghost sm">Vaciar pedido</button>');vc.onclick=function(){S.items=[];S.view="load";save();render();};
  rb.appendChild(ai);rb.appendChild(vc);main.appendChild(rb);
  var gen=h('<button class="big">Generar ruta</button>');gen.onclick=function(){set("view","route");};main.appendChild(gen);
}

function aisleCard(g,step){
  var z=ZONE_LABEL[zoneOf(g.prefix)]||"";
  var allDone=g.items.every(function(it){return it.done;});
  var card=h('<div class="aisle'+(allDone?" done":"")+(g.special?" sp":"")+'"></div>');
  card.appendChild(h('<div class="aisle-head"><div class="aisle-id"><span class="step-no">'+step+'</span><span class="aisle-code">'+esc(g.aisle)+'</span></div><div class="aisle-meta"><div class="zone">'+esc(z)+'</div><div class="count">'+g.items.length+' '+(g.items.length===1?"producto":"productos")+'</div></div></div>'));
  var box=h('<div></div>');
  g.items.forEach(function(it){
    var b=h('<button class="item'+(it.done?" done":"")+'"></button>');
    var sub="";
    if(it.client)sub+='<em class="cl" style="background:'+CLIENT_COLORS[it.client]+';color:#1A1300">Cliente '+it.client+'</em>';
    if(it.section!=null)sub+='<em>Sec '+it.section+'</em>';
    if(it.qty>1)sub+='<em>×'+it.qty+'</em>';
    if(it.perishable)sub+='<em class="frio">frío</em>';
    b.innerHTML='<span class="check">'+(it.done?"✓":"")+'</span><span class="item-body"><span class="item-name">'+esc(it.name)+'</span><span class="item-sub">'+sub+'</span></span>';
    b.onclick=function(){it.done=!it.done;save();render();};
    box.appendChild(b);
  });
  card.appendChild(box);
  return card;
}

function renderRoute(main,normal,special,total,units){
  if(total===0){main.appendChild(h('<div class="empty">No hay items para rutear.</div>'));return;}
  main.appendChild(h('<div class="summary"><div><b>'+(normal.length+special.length)+'</b><span>aisles</span></div><div><b>'+total+'</b><span>productos</span></div><div><b>'+units+'</b><span>unidades</span></div></div>'));
  normal.forEach(function(g,i){main.appendChild(aisleCard(g,i+1));});
  if(special.length){main.appendChild(h('<div class="sp-head">🔒 Recoger en caja — al final</div>'));special.forEach(function(g,i){main.appendChild(aisleCard(g,normal.length+i+1));});}
  main.appendChild(h('<div class="foot">Salida por la puerta derecha →</div>'));
  var nb=h('<button class="ghost">Nuevo pedido</button>');nb.onclick=function(){S.items=[];S.view="load";save();render();};main.appendChild(nb);
}

function zoneCard(title,hint,items,icon){
  var c=h('<div class="zone-card"></div>');
  c.appendChild(h('<div class="zone-h"><span class="zone-icon">'+icon+'</span><div><div class="zone-title">'+title+'</div><div class="zone-hint">'+hint+'</div></div><div class="zone-n">'+items.length+'</div></div>'));
  if(!items.length){c.appendChild(h('<div class="zone-empty">—</div>'));}
  else{items.forEach(function(it){var cl=it.client?'<span class="cl" style="background:'+CLIENT_COLORS[it.client]+';color:#1A1300">'+it.client+'</span>':"";c.appendChild(h('<div class="zone-item">'+cl+'<span class="zone-name">'+esc(it.name)+'</span>'+(it.qty>1?'<span class="zone-qty">×'+it.qty+'</span>':"")+'</div>'));});}
  return c;
}
function renderCart(main,cart,clients,total){
  if(total===0){main.appendChild(h('<div class="empty">No hay items. Carga un pedido.</div>'));return;}
  var lead=cart.mode==="multi"?("Pedido de "+clients.length+" clientes ("+clients.join(", ")+"). El de más bulto va al área grande; el resto se reparte por tamaño."):(clients.length===0?"Un solo pedido. Reparto por tamaño/peso.":("Un cliente ("+clients.join(", ")+"). Reparto por tamaño/peso."));
  main.appendChild(h('<p class="lead">'+lead+'</p>'));
  main.appendChild(zoneCard("Área grande","Canasta principal",cart.zones.grande,"▣"));
  main.appendChild(zoneCard("Canasta pequeña","Cesta de arriba · chico / frágil",cart.zones.canasta,"▢"));
  main.appendChild(zoneCard("Rejilla inferior","Bandeja de abajo · pesado / voluminoso",cart.zones.rejilla,"▤"));
  main.appendChild(h('<p class="hint" style="margin-top:14px">El bulto se estima del tamaño en el nombre (lb, oz, fl oz, gallon, count) × cantidad. Es una guía.</p>'));
  var vb=h('<button class="ghost">Ver ruta</button>');vb.onclick=function(){set("view","route");};main.appendChild(vb);
}

render();
</script>
</body>
</html>
