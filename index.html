<style>
:root{--bg:#0F1420;--surf:#1A2233;--surf2:#232E44;--line:#2C3852;--tx:#EAF0FF;--mut:#8C9BB8;--acc:#FFD23F;--ok:#34D399;--sp:#FB7185;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased}
#app{max-width:560px;margin:0 auto;min-height:100vh;padding-bottom:96px}
.head{padding:16px 16px 12px;background:linear-gradient(180deg,#141B2B,#0F1420);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
.head-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.kicker{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--acc);font-weight:800}
.store{font-size:20px;font-weight:800;margin-top:2px}
.entrada{font-size:11px;color:var(--mut);text-align:right;line-height:1.3;max-width:110px;border:1px solid var(--line);border-radius:8px;padding:5px 7px}
.prog{display:flex;align-items:center;gap:10px;margin-top:12px}
.prog-bar{flex:1;height:8px;background:var(--surf2);border-radius:99px;overflow:hidden}
.prog-bar>span{display:block;height:100%;background:var(--ok);transition:width .3s}
.prog-txt{font-size:12px;color:var(--mut);font-weight:600;white-space:nowrap}
.steps{display:flex;gap:6px;padding:12px 16px}
.step{flex:1;background:var(--surf);border:1px solid var(--line);color:var(--mut);padding:9px 4px;border-radius:10px;font-size:12px;font-weight:700}
.step.on{background:var(--acc);color:#1A1300;border-color:var(--acc)}
.pad{padding:4px 16px 24px}
.lead{color:var(--mut);font-size:14px;line-height:1.5;margin:8px 0 18px}
.big{width:100%;background:var(--acc);color:#1A1300;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:800;margin:4px 0}
.ghost{width:100%;background:var(--surf);color:var(--tx);border:1px solid var(--line);border-radius:12px;padding:13px;font-size:14px;font-weight:700;margin:4px 0}
.ghost.sm{width:auto;flex:1;padding:10px;font-size:13px}
.opt{background:var(--surf);border:1px solid var(--line);border-radius:14px;padding:14px;margin:0 0 12px}
.opt-h{font-size:13px;font-weight:800;margin-bottom:10px}
.file{width:100%;background:var(--surf2);border:1px dashed var(--mut);color:var(--tx);border-radius:10px;padding:14px 12px;font-size:14px}
.file::file-selector-button{background:var(--acc);color:#1A1300;border:none;border-radius:8px;padding:9px 14px;font-weight:800;font-size:13px;margin-right:12px}
.status{margin-top:10px;background:rgba(255,210,63,.12);border:1px solid var(--acc);color:#FFE9A6;padding:10px 12px;border-radius:10px;font-size:13px;font-weight:600}
.error{margin-top:10px;background:rgba(251,113,133,.12);border:1px solid var(--sp);color:#FFD7DE;padding:10px 12px;border-radius:10px;font-size:13px}
.hint{color:var(--mut);font-size:12px;margin:10px 0 6px}
.hint code{background:var(--surf2);padding:2px 6px;border-radius:5px;color:var(--acc);font-size:11px}
.ta{width:100%;background:var(--surf);border:1px solid var(--line);color:var(--tx);border-radius:10px;padding:10px;font-size:13px;font-family:ui-monospace,monospace;resize:vertical}
.row-btns{display:flex;gap:8px;margin:10px 0}
.empty{color:var(--mut);text-align:center;padding:40px 20px;font-size:14px}
.in{background:var(--surf2);border:1px solid var(--line);color:var(--tx);border-radius:8px;padding:8px;font-size:13px;width:100%}
.edit{background:var(--surf);border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:10px}
.edit.sp{border-color:var(--sp)}
.in.name{margin-bottom:8px;font-weight:600}
.edit-row{display:flex;gap:6px;align-items:flex-end}
.edit-row label{font-size:10px;color:var(--mut);font-weight:700;text-transform:uppercase;flex:1}
.edit-row label:first-child{flex:1.4}
.del{background:transparent;border:1px solid var(--line);color:var(--sp);border-radius:8px;width:38px;height:36px;font-size:14px;flex:none}
.tag-sp{color:var(--sp);font-size:12px;font-weight:700;margin-top:8px}
.client-row{display:flex;align-items:center;gap:6px;margin-top:8px}
.client-lbl{font-size:10px;color:var(--mut);font-weight:700;text-transform:uppercase;margin-right:2px}
.client-btn{width:34px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--surf2);color:var(--mut);font-weight:800;font-size:13px}
.client-btn.clr{color:var(--sp)}
.summary{display:flex;gap:8px;margin:6px 0 16px}
.summary>div{flex:1;background:var(--surf);border:1px solid var(--line);border-radius:12px;padding:12px 8px;text-align:center}
.summary b{display:block;font-size:22px;font-weight:800;color:var(--acc)}
.summary span{font-size:11px;color:var(--mut);text-transform:uppercase}
.aisle{background:var(--surf);border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden}
.aisle.done{opacity:.5}.aisle.sp{border-color:var(--sp)}
.aisle-head{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--surf2)}
.aisle-id{display:flex;align-items:center;gap:10px}
.step-no{background:var(--bg);color:var(--mut);width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
.aisle-code{font-size:22px;font-weight:800;color:var(--acc)}
.aisle.sp .aisle-code{color:var(--sp)}
.aisle-meta{text-align:right}
.zone{font-size:12px;color:var(--mut);font-weight:600}
.count{font-size:12px;font-weight:700}
.item{display:flex;align-items:center;gap:11px;padding:12px 14px;background:transparent;border:none;border-top:1px solid var(--line);text-align:left;width:100%;color:var(--tx)}
.check{width:26px;height:26px;border:2px solid var(--line);border-radius:8px;flex:none;display:flex;align-items:center;justify-content:center;color:var(--ok);font-weight:900}
.item.done .check{background:var(--ok);border-color:var(--ok);color:#04241A}
.item-body{display:flex;flex-direction:column;gap:3px;min-width:0}
.item-name{font-size:14px;font-weight:600;line-height:1.3}
.item.done .item-name{text-decoration:line-through;color:var(--mut)}

/* ============ Mapa 2483 ============
GEOMETRÍA FÍSICA DE LA TIENDA:

ENTRADA: Puerta derecha (vista desde afuera)
└─ Al cruzar, justo a la derecha comienza ÁREA AP (Frutas/Verduras)

ZONA AP (Fresh Produce):
├─ AP1, AP2, AP3... AP9
├─ AP1 = más cerca de la entrada derecha
└─ AP9 = más lejos de la entrada derecha

ZONA A (Pasillos Grocery):
├─ A1 = frente al área AP (referencia visual principal)
├─ Frente a A1 = AP (no hay otro pasillo A)
├─ Patrón desde A2 en adelante (emparejados):
│  ├─ A2 ↔ A3 (enfrentados, A3 = Congelados/Frozen)
│  ├─ A6 ↔ A7 (enfrentados)
│  └─ A30 ↔ A31 (enfrentados, cerca AC5, AC4)
└─ Números A aumentan = internan más en la tienda

ESTANTES GR (perpendicular a pasillos A):
├─ GR1, GR2, GR3... (hasta cerca de A31)
├─ Ubicados a la IZQUIERDA de los pasillos A (vista entrada)
├─ GR1 = inicio/lado izquierdo de la zona A
└─ Números GR aumentan hacia el fondo (dirección A31)

ORIENTACIÓN INTERNA - Pasillos A:
├─ Sección 1 de cada pasillo = LADO IZQUIERDO
├─ Secciones 20+ = LADO DERECHO (pared derecha tienda)
└─ Conforme sube la sección, se va hacia la derecha

PARED DERECHA (desde entrada hacia fondo):
├─ A36 — pegado a pared derecha, frente a AP (Frutas/Verduras)
│  ├─ Secciones DESCENDENTES desde entrada: 5→4→3→2→1
│  └─ A36-5 (cerca entrada) → A36-1 (fondo/pared derecha)
├─ [puerta de almacén/backroom Walmart]
└─ A35 parcial (secciones 14→8 pegadas a la pared)
   ├─ A35-14 (más cerca entrada) → A35-8 (más al fondo)
   └─ NOTA: A35 también tiene sección de Deli (separada)

============================================== */

var ZONE_BASE={Y:10,I:20,L:30,K:40,H:50,F:60,E:70,D:80,C:90,B:100,J:110,G:120,GR:115};
var ZONE_LABEL={Y:"Garden / Exterior",I:"Toys / Sports",L:"Auto / Hardware / Paint",K:"Electronics",H:"Home",F:"Office / Arts / Party / Seasonal",E:"Baby / Girls",D:"Mens / Boys",C:"Intimates / Jewelry",B:"Womens",J:"Shoes / Pets",G:"Health / Beauty / Personal Care",A:"Grocery",AP:"Fresh Produce",AB:"Bakery",AD:"Deli",AC:"Meat & Seafood",GR:"Internal Ref (Grocery)",Z:"Checkout"};

/* ---- REFERENCIA VISUAL - Geometría Walmart #2483 ----
   PUERTA DERECHA (entrada/salida)
   └─────────────────────────────
      [A36-5] pared ──→ A36-4 → A36-3 → A36-2 → A36-1
              [backroom door]
      [A35-14]pared ──→ A35-13 → ... → A35-8

      GR1 ── A1  A2  A3  A6  A7  ...  A30  A31 ── AC5, AC4

function parseAisle(code){var m=String(code||"").trim().toUpperCase().match(/^([A-Z]+)\s*(\d+)?$/);if(!m)return{prefix:String(code||"").toUpperCase(),num:null};return{prefix:m[1],num:m[2]!=null?parseInt(m[2],10):null};}
function baseSeq(p,n){
  if(p==="A"&&n!=null){
    // A36 y A35 son pared derecha — van ANTES de los pasillos (cerca entrada)
    if(n===36)return 196; // pared derecha, primera desde entrada
    if(n===35)return 197; // pared derecha, segunda (después de backroom)
    return 200+n;
  }
  if(p==="AC")return 233+(n||0)/1000;if(p==="AB")return 234+(n||0)/1000;if(p==="AD")return 235+(n||0)/1000;if(p==="AP")return 235.5+(n||0)/1000;if(ZONE_BASE[p]!=null)return ZONE_BASE[p]+(n!=null?n/100:0);if(p==="Z")return 900+(n||0)/100;return 500;
}
function sectionDir(p,n){
  if(p==="A"&&n!=null){
    // A36 y A35 pared derecha: secciones DESCENDENTES (mayor número cerca entrada)
    if(n===36||n===35)return -1;
    if(n<=29&&n%2===1){var v=(n-1)/2;return v%2===0?1:-1;}
  }
  return 1;
}
function zoneOf(p){if(["A","AP","AB","AD","AC"].indexOf(p)>=0)return p==="A"?"A":p;return p;}
function isSpecial(it,specials){var a=String(it.aisle||"").toUpperCase();for(var i=0;i<specials.length;i++){var s=specials[i];if(s.aisle.toUpperCase()!==a)continue;if(it.section==null)return true;if(it.section>=s.from&&it.section<=s.to)return true;}return false;}
function buildRoute(items,specials){var en=items.map(function(it,i){if(it.status==="picked"||it.status==="manual_delete")return null;var pa=parseAisle(it.aisle);var sp=isSpecial(it,specials);return Object.assign({},it,{_i:i,prefix:pa.prefix,num:pa.num,seq:baseSeq(pa.prefix,pa.num)+(sp?9000:0),special:sp});}).filter(Boolean);var g={};en.forEach(function(it){var k=String(it.aisle||"?").toUpperCase();if(!g[k])g[k]={aisle:k,prefix:it.prefix,num:it.num,seq:it.seq,special:it.special,items:[]};g[k].items.push(it);});var arr=Object.keys(g).map(function(k){return g[k];}).sort(function(a,b){return a.seq-b.seq;});arr.forEach(function(gr){var d=sectionDir(gr.prefix,gr.num);gr.items.sort(function(x,y){return d*((x.section==null?0:x.section)-(y.section==null?0:y.section));});});return arr;}
/* ---- bulto ---- */
function parseSize(name){var n=(name||"").toLowerCase(),bulk=1,heavy=false,large=false,fragile=false,m;
m=n.match(/(\d+(?:\.\d+)?)\s*(?:lb|lbs|pound)/);if(m){var v=parseFloat(m[1]);bulk=Math.max(bulk,v/10);if(v>=15){heavy=true;large=true;}}
if(/\bgallon\b|\bgal\b/.test(n)){bulk=Math.max(bulk,5);large=true;}
m=n.match(/(\d+)\s*(?:count|ct|pack|pk|bottles?)/);if(m){var c=parseInt(m[1],10);if(c>=12){bulk=Math.max(bulk,3);large=true;}if(c>=24)heavy=true;}
m=n.match(/(\d+(?:\.\d+)?)\s*fl\s*oz/);if(m){var f=parseFloat(m[1]);bulk=Math.max(bulk,f/40);if(f>=60)large=true;if(f<3)fragile=true;}
else{m=n.match(/(\d+(?:\.\d+)?)\s*oz/);if(m){var o=parseFloat(m[1]);bulk=Math.max(bulk,o/32);if(o<3)fragile=true;}}
return{bulk:bulk,heavy:heavy,large:large,fragile:fragile};}
function itemBulk(it){return parseSize(it.name).bulk*(Number(it.qty)||1);}
function itemClass(it){var s=parseSize(it.name),tb=s.bulk*(Number(it.qty)||1);if(s.heavy||tb>=6)return"heavy";if(s.fragile&&!s.large)return"fragile";if(tb<=1.5)return"small";return"medium";}
function suggestCart(items){var zones={grande:[],canasta:[],rejilla:[]};if(!items.length)return{mode:"single",zones:zones};var groups={};items.forEach(function(it){var c=(it.client||"").toUpperCase()||"—";(groups[c]=groups[c]||[]).push(it);});var labels=Object.keys(groups).filter(function(c){return c!=="—";});
if(labels.length<=1){items.forEach(function(it){var cls=itemClass(it);if(cls==="heavy")zones.rejilla.push(it);else if(cls==="fragile"||cls==="small")zones.canasta.push(it);else zones.grande.push(it);});return{mode:"single",zones:zones};}
var totals=Object.keys(groups).map(function(c){return{c:c,its:groups[c],bulk:groups[c].reduce(function(s,i){return s+itemBulk(i);},0)};}).sort(function(a,b){return b.bulk-a.bulk;});var big=totals[0];big.its.forEach(function(it){zones.grande.push(it);});totals.slice(1).forEach(function(t){t.its.forEach(function(it){var cls=itemClass(it);if(cls==="heavy")zones.rejilla.push(it);else zones.canasta.push(it);});});return{mode:"multi",zones:zones,bigClient:big.c};}

/* ============ Lectura IA ============ */
function fileToB64(file){return new Promise(function(res,rej){var r=new FileReader();r.onload=function(){res(String(r.result).split(",")[1]);};r.onerror=function(){rej(new Error("no se pudo leer la imagen"));};r.readAsDataURL(file);});}
/* ---- Validación de item individual ---- */
function itemKey(it){
  return (it.name||"").toLowerCase().replace(/\s+/g," ").trim()
    +"|"+(it.aisle||"").toUpperCase()
    +"|"+(it.section!=null?it.section:"?");
}
function isValidItem(x){
  var name=String(x.name||"").trim();
  if(!name||name.length<4)return false;
  // "Item $1.97" · "Item at $1.97" · "Item @ $1.97" · cualquier variante
  if(/^item\b.{0,20}\$?[\d.]+$/i.test(name))return false;
  // Solo precio suelto
  if(/^\$[\d.]+$/.test(name))return false;
  // Solo número + unidad
  if(/^[\d.]+\s*(oz|fl|lb|g|kg|ml|l|ct|pk)?$/i.test(name))return false;
  // Nombre empieza con precio y es muy corto
  if(/^\$\d/.test(name)&&name.split(" ").length<3)return false;
  // Fragmento genérico: "<N> oz bag", "<N> oz bag, sec N" sin marca
  if(/^\d+\s*oz\s*bag$/i.test(name))return false;
  return true;
}
/* ---- Deduplicación global cross-imagen ---- */
function deduplicateItems(existing,incoming){
  var keys=new Set(existing.map(function(it){return itemKey(it);}));
  var added=[];
  incoming.forEach(function(it){
    var k=itemKey(it);
    if(!keys.has(k)){keys.add(k);added.push(it);}
  });
  return added;
}

function extractOneImage(file){
  var prompt='Eres un extractor de pedidos de Walmart Spark. Analiza esta captura con MUCHO cuidado.\n\nREGLAS ESTRICTAS:\n1. Solo extrae items COMPLETOS. Un item completo tiene: nombre del producto legible + al menos Aisle o Sección visibles.\n2. RECHAZA fragmentos parciales. No es válido: "Item $1.97", solo un precio, solo una cantidad, texto cortado, producto sin nombre.\n3. RECHAZA items cortados por el borde superior o inferior de la imagen (filas incompletas).\n4. Si el mismo producto aparece varias veces en la imagen con el mismo Aisle y Sección, inclúyelo UNA sola vez.\n5. "?" como aisle es válido si el número de aisle no es legible.\n\nDevuelve SOLO un arreglo JSON, sin texto ni markdown:\n[{"name":string,"aisle":string,"section":number|null,"modular":number|null,"qty":number,"perishable":boolean,"client":"A"|"B"|"C"|null}]\n\nSi no hay items válidos, devuelve [].';
  return fileToB64(file).then(function(d){
    var img={type:"image",source:{type:"base64",media_type:(file.type&&file.type.indexOf("image/")===0)?file.type:"image/jpeg",data:d}};
    var body={model:S.model,max_tokens:1200,messages:[{role:"user",content:[img,{type:"text",text:prompt}]}]};
    return fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"content-type":"application/json","x-api-key":S.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify(body)})
    .then(function(resp){
      if(!resp.ok)return resp.json().catch(function(){return null;}).then(function(ej){var d="HTTP "+resp.status;if(ej&&ej.error&&ej.error.message)d+=" · "+ej.error.message;throw new Error(d);});
      return resp.json();
    }).then(function(data){
      if(data&&data.error)throw new Error(data.error.message||"error de la IA");
      var text=(data.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("\n");
      var clean=text.replace(/```json/gi,"").replace(/```/g,"").trim();
      var a=clean.indexOf("["),b=clean.lastIndexOf("]");
      var js=(a>=0&&b>=0)?clean.slice(a,b+1):clean;
      var arr;try{arr=JSON.parse(js);}catch(e){throw new Error("respuesta no entendible");}
      if(!Array.isArray(arr))arr=[];
      // Normalizar y validar cada item
      return arr
        .map(function(x){return{
          name:String(x.name||"").trim(),
          aisle:(x.aisle||"").toString().toUpperCase().replace(/\s+/g,""),
          section:x.section==null?null:Number(x.section),
          modular:x.modular==null?null:x.modular,
          qty:x.qty?Number(x.qty):1,
          perishable:!!x.perishable,
          client:x.client?String(x.client).toUpperCase().replace(/[^ABC]/g,"")||null:null,
          done:false,
          status:"pending"
        };})
        .filter(isValidItem);
    });
  });
}

/* estado de imágenes: S.imgQueue = [{name,status,items,count,skipped,error}] */
function processImageQueue(queue){
  var pending=queue.filter(function(e){return e.status==="pending"||e.status==="error";});
  if(!pending.length)return;
  render();
  var chain=Promise.resolve();
  pending.forEach(function(entry){
    chain=chain.then(function(){
      entry.status="processing";render();
      return extractOneImage(entry.file).then(function(items){
        // Deduplicar contra lo ya guardado en S.items
        var unique=deduplicateItems(S.items,items);
        var skipped=items.length-unique.length;
        entry.status="done";
        entry.items=unique;
        entry.count=unique.length;
        entry.skipped=skipped;
        S.items=S.items.concat(unique);
        save();render();
      }).catch(function(err){
        var msg=(err&&err.message)||"error";
        if(/timeout/i.test(msg))entry.status="timeout";
        else if(/HTTP 4/i.test(msg))entry.status="error_api";
        else entry.status="error";
        entry.error=msg;
        render();
      });
    });
  });
  chain.then(function(){
    var allDone=queue.every(function(e){return e.status==="done"||e.status==="error"||e.status==="timeout"||e.status==="error_api";});
    if(allDone&&S.items.length){S.view="review";}
    S.loading=false;render();
  });
}
function startImageQueue(files){
  if(!files||!files.length)return;
  if(!S.apiKey){S.error="Falta clave de API (abre Ajustes ⚙)";render();return;}
  var arr=Array.prototype.slice.call(files);
  if(!S.imgQueue)S.imgQueue=[];
  arr.forEach(function(f){S.imgQueue.push({name:f.name||"imagen",file:f,status:"pending",items:[],count:0,skipped:0,error:""});});
  S.loading=true;S.error="";
  processImageQueue(S.imgQueue);
}

function apiJson(body){

  .then(function(r){if(!r.ok)return r.json().catch(function(){return null;}).then(function(e){throw new Error("HTTP "+r.status+(e&&e.error?" · "+e.error.message:""));});return r.json();})
  .then(function(d){if(d&&d.error)throw new Error(d.error.message||"error IA");var t=(d.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("");var clean=t.replace(/```json/gi,"").replace(/```/g,"").trim();var a=clean.indexOf("{"),b=clean.lastIndexOf("}");return JSON.parse((a>=0&&b>=0)?clean.slice(a,b+1):clean);});}
function startOOS(files){
  if(!files||!files.length)return;
  if(!S.apiKey){S.oosError="Falta clave de API (abre Ajustes ⚙)";render();return;}
  S.oosStatus="Analizando imágenes…";S.oosError="";render();
  Promise.all(Array.prototype.slice.call(files,0,2).map(function(f){return fileToB64(f).then(function(d){return{type:"image",source:{type:"base64",media_type:(f.type&&f.type.indexOf("image/")===0)?f.type:"image/jpeg",data:d}};});}))
  .then(function(imgs){
    var prompt='You help a Walmart Spark driver handle out-of-stock items. Image 1: Spark app screenshot showing the out-of-stock item. Image 2: store shelf photo with possible substitutes. Return ONLY a JSON object, no markdown:\n{"itemName":string,"alternatives":[string,...],"customerMessage":string,"fallback":string}\ncustomerMessage: friendly English message to the customer — (1) apologize the item is out of stock, (2) list each alternative from the shelf with a very brief description, (3) ask which they prefer or if they want to skip it. Keep it conversational and concise.\nfallback: what to do if no reply in ~5 min — either "No substitution — skip the item" or "Substitute with [exact product name]: [one sentence why it is a good match]".';
    return apiJson({model:S.model,max_tokens:1000,messages:[{role:"user",content:imgs.concat([{type:"text",text:prompt}])}]});
  })
  .then(function(p){
    var chat={id:Date.now(),itemName:p.itemName||"Item",alternatives:p.alternatives||[],customerMsg:p.customerMessage||"",fallback:p.fallback||"",thread:[],closed:false,closedWith:null,finalMessage:null,finalDecision:null,finalReason:null,finalSubName:null};
    S.oosChats.unshift(chat);S.oosActive=0;S.oosStatus="";save();render();
  })
  .catch(function(err){S.oosStatus="";S.oosError="Error: "+(err.message||"error");render();});
}
function replyOOS(chatIdx,file){
  var chat=S.oosChats[chatIdx];if(!chat)return;
  S.oosStatus="Leyendo respuesta del cliente…";S.oosError="";render();
  fileToB64(file).then(function(d){
    var img={type:"image",source:{type:"base64",media_type:(file.type&&file.type.indexOf("image/")===0)?file.type:"image/jpeg",data:d}};
    var ctx="Out-of-stock item: "+chat.itemName+"\nAlternatives offered: "+chat.alternatives.join(", ")+"\nMessage sent to customer: "+chat.customerMsg;
    if(chat.thread.length){ctx+="\nConversation so far:\n";chat.thread.forEach(function(t){ctx+=(t.role==="customer"?"Customer: ":"Suggestion: ")+t.text+"\n";});}
    var prompt=ctx+'\n\nThis screenshot is the customer\'s reply. Read it carefully. Return ONLY JSON (no markdown):\n{"customerSaid":string,"nextAction":string,"actionType":"substitute"|"no_substitute"|"ask_again"|"done"}\ncustomerSaid: what the customer wrote (paraphrased if needed). nextAction: exact next step for the driver (e.g. a specific message to send back, or "Mark as substituted with [X]" or "Mark item as refunded"). actionType: substitute=pick a specific item and mark it; no_substitute=skip/refund; ask_again=customer is unclear, send a follow-up; done=decision confirmed, conversation can close.';
    return apiJson({model:S.model,max_tokens:600,messages:[{role:"user",content:[img,{type:"text",text:prompt}]}]});
  })
  .then(function(p){
    var chat=S.oosChats[chatIdx];
    chat.thread.push({role:"customer",text:p.customerSaid||""});
    chat.thread.push({role:"suggestion",text:p.nextAction||"",actionType:p.actionType||""});
    S.oosStatus="";save();render();
  })

}

var REASONS=[
  {key:"closest_match",label:"Más parecido disponible"},
  {key:"same_brand_diff_size",label:"Misma marca, tamaño diferente"},
  {key:"diff_brand_same_type",label:"Mismo tipo, marca diferente"},
  {key:"better_price",label:"Mejor precio disponible"},
  {key:"similar_qty",label:"Cantidad similar"},
  {key:"store_recommended",label:"Recomendado por la tienda"},
  {key:"closest_available",label:"Más cercano al original"},
  {key:"no_good_match",label:"No había sustitución adecuada"}
];
/* Mensaje al cliente SIEMPRE en inglés; REASONS arriba (labels en español) son solo para la UI interna. */
var REASON_PHRASES_EN={
  closest_match:"it was the closest available option in type, size, and intended use",
  same_brand_diff_size:"it is the same brand in a different size, the closest match to the original item",
  diff_brand_same_type:"it is the same type of product from a different brand, the closest available alternative",
  better_price:"it was a more cost-effective option without losing similarity to the original item",
  similar_qty:"it keeps a similar quantity to what was originally requested",
  store_recommended:"it was the option recommended by the store as a replacement",
  closest_available:"it was the closest available option to the original product at the time"
};
function guessFallbackDefaults(chat){
  var fb=chat.fallback||"";
  var m=fb.match(/substitute with ([^:]+):?/i);
  if(m)return{decision:"sub",subName:m[1].trim()};
  if(/no subst/i.test(fb))return{decision:"no_sub",subName:""};
  return{decision:"sub",subName:""};
}
function buildSubMessage(orig,sub,reasonKey){
  var origPart=orig?(' ("'+orig+'")'):"";
  if(reasonKey==="no_good_match"){
    return "Hi. The original item"+origPart+" was unavailable and I could not find a close enough substitute. Since I did not receive a response within the available time, I decided not to substitute it to avoid sending the wrong product. If you would like, I can process a refund for this item.";
  }
  var subPart=sub?("I substituted it with the "+sub):"I substituted it with the closest available option";
  var phrase=REASON_PHRASES_EN[reasonKey]||"it seemed like the closest and most appropriate option available";
  return "Hi. Since I did not receive a response within the available time, "+subPart+" because "+phrase+". I selected the option that seemed most similar and appropriate for your order. Let me know if you have any questions.";
}

      var card=h('<div style="background:var(--surf);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;gap:10px;align-items:center"></div>');
      var info=h('<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700">'+esc(g.condo)+'</div><div style="font-size:11px;color:var(--mut)">'+esc(g.calle)+'</div><div style="font-size:12px;color:var(--acc);font-weight:800;margin-top:4px">'+esc(g.code)+'</div></div>');
      card.appendChild(info);
      var del=h('<button style="background:transparent;border:none;color:var(--sp);font-size:16px;cursor:pointer;padding:6px">✕</button>');
      del.onclick=function(){S.gateCodesCustom.splice(idx,1);save();render();};
      card.appendChild(del);
      main.appendChild(card);
    });
    
    var exp=h('<button class="ghost sm" style="width:100%;margin-top:12px">📥 Exportar CSV</button>');

  function onAddGateCode(input){
    var files=Array.prototype.slice.call(input.files||[]);
    if(!files.length){addStatus.innerHTML='<div class="error" style="margin-top:8px">Selecciona una imagen</div>';return;}
    addStatus.innerHTML='<div class="status" style="margin-top:8px">Analizando…</div>';
    
    fileToB64(files[0]).then(function(b64){
      var prompt='Extract from this Spark delivery screenshot: 1) "code" = the Access Code (e.g. 578459, #8329) — the digits shown under "Access Code". 2) "address" = the full street address including unit number (e.g. "8649 Horizon Wind Ave, Unit 103"). 3) "customer" = the customer name shown (e.g. "Galinda W."). 4) "condo" = apartment complex/building name ONLY if clearly shown, otherwise null. Return ONLY valid JSON: {"code":"578459","address":"8649 Horizon Wind Ave, Unit 103","customer":"Galinda W.","condo":null}. Code, address and customer are the most important.';
      var body={model:S.model,max_tokens:200,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:files[0].type||"image/jpeg",data:b64}},{type:"text",text:prompt}]}]};
      return fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"content-type":"application/json","x-api-key":S.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify(body)}).then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();});
    }).then(function(data){
      var txt=(data.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("").trim();
      var clean=txt.replace(/```json/gi,"").replace(/```/g,"").trim();
      var parsed=JSON.parse(clean);
      
      /* Requiere código + dirección. */
      if(!parsed.code||!parsed.address){addStatus.innerHTML='<div class="error" style="margin-top:8px">No encontré Access Code o dirección en la captura. Asegúrate de que ambos sean visibles.</div>';return;}
      
      /* Etiqueta: nombre del cliente (siempre está) + condo si existe */
      var label=parsed.customer||parsed.address.split(",")[0];
      
      /* Dedup por código + dirección */
      var exists=S.gateCodesCustom.some(function(g){return g.code===parsed.code&&g.address===parsed.address;});
      if(exists){addStatus.innerHTML='<div class="hint" style="margin-top:8px">✓ Este código ya existe.</div>';input.value="";return;}
      
      S.gateCodesCustom.push({condo:label,customer:parsed.customer||"",complex:parsed.condo||"",calle:parsed.address,address:parsed.address,code:parsed.code});
      save();
      addStatus.innerHTML='<div class="status" style="margin-top:8px">✓ Agregado: '+esc(label)+' → '+esc(parsed.code)+'</div>';
      input.value="";
      hint.textContent=(GATE_CODES.length+S.gateCodesCustom.length)+' códigos ('+(GATE_CODES.length)+' base + '+S.gateCodesCustom.length+' personalizados)';
      setTimeout(function(){render();},1200);
    }).catch(function(err){addStatus.innerHTML='<div class="error" style="margin-top:8px">Error: '+(err&&err.message?err.message:"error")+'</div>';});
  }
}

function exportGateCodesCSV(){

  var link=document.createElement("a");

/* ============ Notas por Dirección ============ */
function normalizeAddress(s){return String(s||"").toLowerCase().replace(/[.,#]/g,"").replace(/\b(apt|unit|suite|ste|building|bldg)\b/g,"").replace(/\s+/g,"").trim();}
function resizeImage(file,maxW,quality){
  return new Promise(function(res,rej){
    var reader=new FileReader();
    reader.onload=function(e){
      var img=new Image();
      img.onload=function(){
        var w=img.width,hh=img.height;
        if(w>maxW){hh=Math.round(hh*maxW/w);w=maxW;}
        var c=document.createElement("canvas");c.width=w;c.height=hh;
        c.getContext("2d").drawImage(img,0,0,w,hh);
        res(c.toDataURL("image/jpeg",quality||0.72));
      };
      img.onerror=function(){rej(new Error("no se pudo procesar la imagen"));};
      img.src=e.target.result;
    };
    reader.onerror=function(){rej(new Error("no se pudo leer la imagen"));};
    reader.readAsDataURL(file);
  });
}
function findAddressMatches(query,excludeIdx){
  var nq=normalizeAddress(query);
  if(!nq)return[];
  return S.addressNotes.map(function(n,i){return{n:n,i:i};}).filter(function(o){if(o.i===excludeIdx)return false;var na=o.n.normalized_address||"";return na&&(na.indexOf(nq)>=0||nq.indexOf(na)>=0);});
}
function newAddressNote(){var now=new Date().toISOString();return{id:Date.now(),full_address:"",normalized_address:"",apartment_number:"",building_number:"",complex_name:"",latitude:null,longitude:null,parking_notes:"",entry_instructions:"",walking_route_notes:"",building_location_notes:"",visual_references:"",images:[],map_images:[],created_at:now,updated_at:now,last_used_at:now};}
/* ---- OCR de dirección desde captura(s) — Spark y/o mapa de condominio ---- */
function ocrAddressFromImages(files){
  if(!S.apiKey)return Promise.reject(new Error("Falta tu clave de API (Ajustes ⚙)"));
  var imgFiles=Array.prototype.slice.call(files,0,2);
  return Promise.all(imgFiles.map(function(f){return fileToB64(f).then(function(d){return{type:"image",source:{type:"base64",media_type:(f.type&&f.type.indexOf("image/")===0)?f.type:"image/jpeg",data:d}};});}))
  .then(function(imgs){
    var prompt='Analiza estas imágenes relacionadas con una entrega. Puede haber 1 o 2 imágenes: una captura de la app Spark (con dirección, unidad, edificio, notas del cliente) y/o una foto de un mapa de condominio (con nombre del complejo, edificios, entradas, estacionamiento). Extrae TODO lo que puedas reconocer. Devuelve SOLO JSON, sin texto ni markdown:\n{"full_address":string|null,"complex_name":string|null,"apartment_number":string|null,"building_number":string|null,"gate_code":string|null,"customer_note":string|null,"is_map_image":boolean,"map_notes":string|null}\nfull_address: dirección completa con ciudad/estado/zip si está visible. complex_name: nombre del condominio/complejo si aparece en cualquiera de las imágenes. is_map_image: true si alguna de las imágenes es un mapa/plano del condominio (no una captura de app). map_notes: si hay un mapa, describe en 1-2 frases breves la ubicación relativa (ej: "Entrada principal sobre Durango Dr; edificio 46 al lado izquierdo, cerca de la entrada"). Si algo no es visible, usa null.';
    var body={model:S.model,max_tokens:500,messages:[{role:"user",content:imgs.concat([{type:"text",text:prompt}])}]};
    return fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"content-type":"application/json","x-api-key":S.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify(body)})
    .then(function(r){if(!r.ok)return r.json().catch(function(){return null;}).then(function(ej){throw new Error("HTTP "+r.status+(ej&&ej.error?" · "+ej.error.message:""));});return r.json();})
    .then(function(data){
      if(data&&data.error)throw new Error(data.error.message||"error IA");
      var txt=(data.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("");
      var clean=txt.replace(/```json/gi,"").replace(/```/g,"").trim();
      var a=clean.indexOf("{"),b=clean.lastIndexOf("}");
      var parsed=JSON.parse((a>=0&&b>=0)?clean.slice(a,b+1):clean);
      return{parsed:parsed,imgFiles:imgFiles};
    });
  });
}
function imgGrid(container,note,field,label,maxW){

  grid.appendChild(add);
  container.appendChild(grid);
}

function startAddressOCR(files){
  if(!files||!files.length)return;
  if(!S.apiKey){S.notesOcrError="Falta clave de API (abre Ajustes ⚙)";render();return;}
  S.notesOcrStatus="Analizando imagen(es)…";S.notesOcrError="";render();
  ocrAddressFromImages(files).then(function(res){
    var p=res.parsed;
    if(!p.full_address&&!p.complex_name){
      S.notesOcrStatus="";S.notesOcrError="No se detectó dirección ni condominio en la imagen. Intenta con otra captura o escribe manualmente.";render();return;
    }
    var imgPromises=res.imgFiles.map(function(f,i){
      var isMap=p.is_map_image&&i===res.imgFiles.length-1; // heurística simple: última imagen suele ser el mapa si is_map_image=true
      return resizeImage(f,isMap?1280:900,0.72).then(function(dataUrl){return{dataUrl:dataUrl,isMap:isMap};});
    });
    Promise.all(imgPromises).then(function(imgResults){
      S.notesOcrStatus="";
      S.notesOcrPending={parsed:p,images:imgResults};
      render();
    });
  }).catch(function(err){
    S.notesOcrStatus="";S.notesOcrError="Error: "+(err&&err.message?err.message:"error");render();
  });
}

  rb.appendChild(bConfirm);main.appendChild(rb);

      if(img.isMap)note.map_images=(note.map_images||[]).concat([img.dataUrl]);
      else note.images=(note.images||[]).concat([img.dataUrl]);

      var b=h('<div class="match-banner">📍 Ya existe una nota similar:</div>');

/* ============ ETA Messages ============ */
function copyText(txt,btn,label){
  var restore=label||btn.textContent;
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(function(){btn.textContent="✓ Copiado";setTimeout(function(){btn.textContent=restore;},2000);});}
  else{var ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();try{document.execCommand("copy");btn.textContent="✓ Copiado";setTimeout(function(){btn.textContent=restore;},2000);}catch(e){}document.body.removeChild(ta);}
}
function getGreeting(){var hr=new Date().getHours();if(hr>=5&&hr<12)return"morning";if(hr>=12&&hr<18)return"afternoon";return"evening";}
function buildETA(g,m){return"Good "+g+"! Your Spark driver here. I should arrive in about "+m+" minute"+(m===1?"":"s")+". Thank you!";}
function renderMsg(main){
  var g=getGreeting(),m=5;
  main.appendChild(h('<p class="lead">Mensajes listos para pegar en el chat de Spark.</p>'));
  main.appendChild(h('<div class="section-title">ETA al cliente</div>'));

  /* greeting selector */
  var gRow=h('<div class="row-btns"></div>');
  var gBtns={};
  [{k:"morning",l:"🌅 Morning"},{k:"afternoon",l:"☀️ Afternoon"},{k:"evening",l:"🌙 Evening"}].forEach(function(x){
    var btn=h('<button class="ghost sm" style="flex:1;font-size:11px">'+x.l+'</button>');
    gBtns[x.k]=btn;
    btn.onclick=function(){g=x.k;refresh();updateMsg();};
    gRow.appendChild(btn);
  });
  main.appendChild(gRow);
  function refresh(){
    Object.keys(gBtns).forEach(function(k){
      var b=gBtns[k];
      if(k===g){b.style.background="var(--acc)";b.style.color="#1A1300";b.style.borderColor="var(--acc)";}
      else{b.style.background="";b.style.color="";b.style.borderColor="";}
    });
  }
  refresh();

  /* minutes */
  var mRow=h('<div style="display:flex;align-items:center;gap:10px;margin:12px 0 10px"></div>');
  mRow.appendChild(h('<span style="font-size:13px;color:var(--mut);font-weight:700">Minutos:</span>'));
  var btnM=h('<button class="ghost sm" style="width:38px;flex:none;padding:8px 0;font-size:18px;line-height:1">−</button>');
  var mVal=h('<span style="font-size:22px;font-weight:900;min-width:36px;text-align:center;color:var(--acc)">5</span>');
  var btnP=h('<button class="ghost sm" style="width:38px;flex:none;padding:8px 0;font-size:18px;line-height:1">+</button>');
  btnM.onclick=function(){if(m>1){m--;mVal.textContent=m;updateMsg();}};
  btnP.onclick=function(){if(m<30){m++;mVal.textContent=m;updateMsg();}};
  mRow.appendChild(btnM);mRow.appendChild(mVal);mRow.appendChild(btnP);
  main.appendChild(mRow);

  /* message */
  var msgBox=h('<div class="msg-box"></div>');
  function updateMsg(){msgBox.textContent=buildETA(g,m);}
  updateMsg();
  main.appendChild(msgBox);
  var cpBtn=h('<button class="copy-btn">Copiar mensaje</button>');
  cpBtn.onclick=function(){copyText(msgBox.textContent,cpBtn,"Copiar mensaje");};
  main.appendChild(cpBtn);

  /* AI personalized — only if there's context */
  var openOOS=S.oosChats.filter(function(c){return!c.closed;});
  var clients=Array.from(new Set(S.items.map(function(it){return(it.client||"").toUpperCase();}).filter(Boolean))).sort();
  if(openOOS.length||clients.length){
    main.appendChild(h('<div class="section-title" style="margin-top:20px">ETA personalizado ✨</div>'));
    main.appendChild(h('<p class="hint">Genera un mensaje que considera las sustituciones y el batch.</p>'));
    if(!S.apiKey){
      main.appendChild(h('<p class="hint">⚠ Necesita clave de API en Ajustes.</p>'));
    } else {
      var aiCard=h('<div style="background:var(--surf);border:1px solid var(--line);border-radius:12px;padding:12px"></div>');
      var genBtn=h('<button class="ghost sm" style="width:100%">✨ Generar mensaje con IA</button>');
      var aiBox=h('<div></div>');
      genBtn.onclick=function(){
        genBtn.textContent="Generando…";genBtn.disabled=true;
        var ctx="You help a Walmart Spark driver send professional messages via customer chat. Your tone is: honest, empathetic, clear about limitations, collaborative (not prescriptive). Time of day: "+g+". ETA: ~"+m+" minute"+(m===1?"":"s")+".";
        if(openOOS.length){ctx+=" Substitution situations during shopping: "+openOOS.map(function(c){var last=null;c.thread.forEach(function(t){if(t.role==="suggestion")last=t;});return'"'+c.itemName+'"'+(last?" → "+last.text:"");}).join("; ")+".";}
        if(clients.length>1){ctx+=" This is a batched order with "+clients.length+" customers ("+clients.join(", ")+").";}
        ctx+=" Reference these real examples of excellent communication: ";
        ctx+="\n— When offering alternatives, explain why: 'The closest option is Horizon Organic Heavy Whipping Cream, but it is not the same as Half & Half and may cost more.'";
        ctx+="\n— Offer refund when substitute is very different: 'Would you like that, or would you prefer a refund?'";
        ctx+="\n— Be honest about app/system limits: \"the app isn't letting me substitute that yogurt on my side. Could you try updating it?\"";
        ctx+="\n— Declare fallbacks early: 'If I don't hear back shortly, I'll go with the white frosting packs.'";
        ctx+="\n— When customer finds the item themselves, acknowledge: 'I see you have the two. Great!'";
        ctx+="\n— Respect 'no sub' decisions immediately, no pushback.";
        ctx+=" Write a warm, brief (2-3 sentences) message. If dealing with OOS/substitutions, explain clearly and offer customer control. Output ONLY the message text — no labels, no quotes.";
        fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"content-type":"application/json","x-api-key":S.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:S.model,max_tokens:200,messages:[{role:"user",content:ctx}]})})
        .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
        .then(function(data){
          var txt=(data.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("").trim();
          aiBox.innerHTML="";
          var ab=h('<div class="msg-box" style="margin-top:8px">'+esc(txt)+'</div>');
          var cb=h('<button class="copy-btn" style="margin-top:6px">Copiar</button>');
          cb.onclick=function(){copyText(txt,cb,"Copiar");};
          aiBox.appendChild(ab);aiBox.appendChild(cb);
          genBtn.textContent="✨ Regenerar";genBtn.disabled=false;
        })
        .catch(function(err){genBtn.textContent="✨ Generar";genBtn.disabled=false;aiBox.innerHTML='<div class="error" style="margin-top:8px">Error: '+esc(err.message||"error")+'</div>';});
      };
      aiCard.appendChild(genBtn);aiCard.appendChild(aiBox);
      main.appendChild(aiCard);
    }
  }
}

function render(){try{_render();}catch(e){
  var app=document.getElementById("app");
  if(app)app.innerHTML='<div style="padding:24px 16px;color:#FFD23F;font-family:monospace;font-size:13px;background:#0F1420;min-height:100vh"><b style="color:#FB7185">⚠ Error de render</b><br><br>'+String(e.message).replace(/</g,"&lt;")+'<br><br><button onclick="localStorage.removeItem(\'spark2483\');location.reload()" style="background:#FB7185;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-weight:800;margin-top:8px">Limpiar datos y recargar</button><br><br><small style="color:#8C9BB8">O recarga la página manualmente si el botón no funciona.</small></div>';
  console.error("render error",e);
}}

  var special=route.filter(function(g){return g.special;});
  var total=S.items.length, done=S.items.filter(function(it){return it.status==="picked";}).length;
  var pending=S.items.filter(function(it){return it.status!=="picked"&&it.status!=="manual_delete";}).length;
  var cart=suggestCart(S.items);
  var clients=Array.from(new Set(S.items.map(function(it){return(it.client||"").toUpperCase();}).filter(Boolean))).sort();
  var units=S.items.reduce(function(s,it){return s+(Number(it.qty)||0);},0);

  var app=document.getElementById("app");
  app.innerHTML="";

  // header
  var head=h('<div class="head"><div class="head-row"><div><div class="kicker">Spark Ruta</div><div class="store">Walmart #2483 · Enterprise</div></div><div class="entrada">entrada/salida ▸ derecha</div></div></div>');
  if(total>0){head.appendChild(h('<div class="prog"><div class="prog-bar"><span style="width:'+(total?(done/total*100):0)+'%"></span></div><div class="prog-txt">'+done+'/'+total+' recogidos</div></div>'));}
  app.appendChild(head);

  // steps
  var steps=h('<div class="steps"></div>');
  [["load","1 · Cargar"],["review","2 · Revisar"],["route","3 · Ruta"],["cart","4 · Carrito"],["oos","5 · Subs"],["gate","🔑 Gate"],["notes","📍 Notas"],["msg","💬 ETA"]].forEach(function(p){
    var openCount=p[0]==="oos"?S.oosChats.filter(function(c){return!c.closed;}).length:0;
    var label=p[1]+(openCount>0?' <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--sp);vertical-align:middle;margin-left:2px;margin-bottom:1px"></span>':"");
    var b=h('<button class="step'+(S.view===p[0]?" on":"")+'">'+label+'</button>');b.onclick=function(){set("view",p[0]);};steps.appendChild(b);
  });
  app.appendChild(steps);

  var main=h('<div class="pad"></div>');

  if(S.view==="load") renderLoad(main);

    kin.oninput=function(){S.apiKey=kin.value;save();};
    cb.appendChild(kin);
    var min=h('<input class="in" style="margin-top:8px" placeholder="modelo" value="'+esc(S.model)+'">');
    min.oninput=function(){S.model=min.value;save();};
    cb.appendChild(h('<p class="hint">Modelo (si da error de modelo, cámbialo):</p>'));
    cb.appendChild(min);
    var clr=h('<button class="ghost sm" style="margin-top:10px;width:100%">Borrar clave</button>');

    cb.appendChild(h('<div class="opt-h" style="margin-top:16px">Estantes especiales (caja)</div>'));

    var ub=h('<button>Deshacer</button>');ub.onclick=function(){undoLast();};
    t.appendChild(ub);
    app.appendChild(t);
  }
}

function renderLoad(main){
  main.appendChild(h('<p class="lead">Sube las capturas de tu pedido de Spark. Cada imagen se procesa por separado para no perder datos si alguna falla.</p>'));

  // Panel de estado de imágenes
  if(S.imgQueue&&S.imgQueue.length){    var STATUS_ICON={pending:"⏳",processing:"🔄",done:"✓",error:"❌",error_api:"❌",timeout:"⏱"};
    var STATUS_LABEL={pending:"Pendiente",processing:"Procesando…",done:"Lista",error:"Error de lectura",error_api:"Error de API",timeout:"Timeout"};
    var qCard=h('<div class="opt"></div>');
    var done=S.imgQueue.filter(function(e){return e.status==="done";}).length;
    var errs=S.imgQueue.filter(function(e){return e.status==="error"||e.status==="timeout"||e.status==="error_api";}).length;
    var proc=S.imgQueue.filter(function(e){return e.status==="processing";}).length;
    qCard.appendChild(h('<div class="opt-h">'+done+'/'+S.imgQueue.length+' imágenes procesadas'+(errs?' · <span style="color:var(--sp)">'+errs+' fallaron</span>':'')+(proc?' · <span style="color:var(--acc)">procesando…</span>':'')+'</div>'));
    S.imgQueue.forEach(function(entry,i){
      var row=h('<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-top:1px solid var(--line)"></div>');
      var icon=STATUS_ICON[entry.status]||"?";
      var col=entry.status==="done"?"var(--ok)":entry.status==="processing"?"var(--acc)":entry.status==="pending"?"var(--mut)":"var(--sp)";
      row.appendChild(h('<span style="font-size:16px;flex:none">'+icon+'</span>'));
      var statusTxt=STATUS_LABEL[entry.status]||"?";
      var countTxt=entry.status==="done"?(" \u2014 "+entry.count+" nuevo"+(entry.count!==1?"s":"")+(entry.skipped?" · "+entry.skipped+" omitido"+(entry.skipped!==1?"s":"")+" (dup/parcial)":"")):"";
      var errTxt=entry.error?(" \u2014 "+esc(entry.error)):"";
      var nameTxt=esc(entry.name);
      var info=document.createElement("div");info.style.cssText="flex:1;min-width:0";
      var d1=document.createElement("div");d1.style.cssText="font-size:12px;font-weight:700;color:"+col;d1.textContent=statusTxt;
      var d2=document.createElement("div");d2.style.cssText="font-size:11px;color:var(--mut);overflow:hidden;text-overflow:ellipsis;white-space:nowrap";d2.textContent=entry.name+countTxt+(entry.error?" \u2014 "+entry.error:"");
      info.appendChild(d1);info.appendChild(d2);
      row.appendChild(info);
      if(entry.status==="error"||entry.status==="timeout"||entry.status==="error_api"){
        var rb=h('<button style="background:transparent;border:1px solid var(--acc);color:var(--acc);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:800;flex:none">🔁</button>');
        rb.onclick=function(){entry.status="pending";entry.error="";S.loading=true;processImageQueue(S.imgQueue);};
        row.appendChild(rb);
      }
      qCard.appendChild(row);
    });
    var qBtns=h('<div class="row-btns" style="margin-top:10px"></div>');
    if(errs){var retr=h('<button class="ghost sm">🔁 Reintentar fallidas</button>');retr.onclick=function(){S.imgQueue.filter(function(e){return e.status!=="done";}).forEach(function(e){e.status="pending";e.error="";});S.loading=true;processImageQueue(S.imgQueue);};qBtns.appendChild(retr);}
    var clrQ=h('<button class="ghost sm">Limpiar cola</button>');clrQ.onclick=function(){S.imgQueue=[];S.loading=false;render();};qBtns.appendChild(clrQ);
    qCard.appendChild(qBtns);
    if(S.items.length){var goBtn=h('<button class="big" style="margin-top:8px">Ver items extraídos ('+S.items.length+')</button>');goBtn.onclick=function(){S.view="review";render();};qCard.appendChild(goBtn);}
    main.appendChild(qCard);
    main.appendChild(h('<hr style="border:none;border-top:1px solid var(--line);margin:16px 0">'));
  }

  var opt=h('<div class="opt"><div class="opt-h">Subir capturas (lee con IA)</div></div>');
  var fi=h('<input class="file" type="file" accept="image/*" multiple'+(S.loading?" disabled":"")+'>');
  fi.onchange=function(e){onPick(e.target);};
  opt.appendChild(fi);
  if(!S.apiKey)opt.appendChild(h('<p class="hint">⚠ Falta tu clave de IA. Ábrela en <b>Ajustes</b> abajo.</p>'));
  opt.appendChild(h('<p class="hint">Sube hasta 12 imágenes. Cada una se analiza por separado.</p>'));
  if(S.error)opt.appendChild(h('<div class="error">'+esc(S.error)+'</div>'));
  main.appendChild(opt);

  var ex=h('<button class="ghost">Cargar ejemplo (pedido Emily Y.)</button>');
  ex.onclick=function(){S.items=EXAMPLE.map(function(g){return Object.assign({},g,{done:false,status:"pending"});});S.imgQueue=[];S.view="review";S.error="";save();render();};
  main.appendChild(ex);

  var opt2=h('<div class="opt"><div class="opt-h">Escribir / pegar lista (respaldo)</div><p class="hint">Una línea por item: <code>Nombre | Aisle | Sección | Cant | Cliente</code></p></div>');
  var ta=h('<textarea class="ta" rows="4" placeholder="Leche | A31 | 7 | 1 | A\nOreo | A24 | 1 | 1 | B"></textarea>');
  ta.value=S.bulk; ta.oninput=function(){S.bulk=ta.value;};
  opt2.appendChild(ta);
  var rb=h('<div class="row-btns"></div>');
  var ab=h('<button class="ghost sm">Agregar lista</button>');ab.onclick=parseBulk;
  var ib=h('<button class="ghost sm">Item en blanco</button>');ib.onclick=function(){addBlank();S.view="review";render();};
  rb.appendChild(ab);rb.appendChild(ib);opt2.appendChild(rb);
  main.appendChild(opt2);
}

function onPick(input){
  var files=Array.prototype.slice.call(input.files||[]);
  if(!files.length){S.error="No se seleccionó ninguna imagen.";render();return;}
  S.error="";
  startImageQueue(files);
  try{input.value="";}catch(e){}
}

function parseBulk(){
  var lines=S.bulk.split("\n").map(function(l){return l.trim();}).filter(Boolean);
  var got=lines.map(function(l){var p=l.split("|").map(function(x){return x.trim();});return{name:p[0]||"Item",aisle:(p[1]||"").toUpperCase().replace(/\s+/g,""),section:p[2]?Number(p[2]):null,modular:null,qty:p[3]?Number(p[3]):1,perishable:false,client:p[4]?(p[4].toUpperCase().replace(/[^ABC]/g,"")||null):null,done:false,status:"pending"};});
  if(got.length){S.items=S.items.concat(got);S.bulk="";S.view="review";save();render();}
}
function addBlank(){S.items.push({name:"",aisle:"",section:null,modular:null,qty:1,perishable:false,client:null,done:false,status:"pending"});save();}

function renderReview(main,total){
  if(total===0){main.appendChild(h('<div class="empty">Aún no hay items. Ve a <b>Cargar</b>.</div>'));return;}
  main.appendChild(h('<p class="lead">Revisa lo extraído y corrige lo necesario antes de armar la ruta.</p>'));
  S.items.forEach(function(it,i){
    var sp=isSpecial(it,S.specials);
    var card=h('<div class="edit'+(sp?" sp":"")+'"></div>');
    var nm=h('<input class="in name" placeholder="Nombre del producto" value="'+esc(it.name)+'">');nm.oninput=function(){it.name=nm.value;save();};
    card.appendChild(nm);
    var row=h('<div class="edit-row"></div>');
    var la=h('<label>Aisle<input class="in" value="'+esc(it.aisle)+'"></label>');la.querySelector("input").oninput=function(e){it.aisle=e.target.value.toUpperCase().replace(/\s+/g,"");save();render();};
    var ls=h('<label>Sec<input class="in" type="number" value="'+(it.section==null?"":it.section)+'"></label>');ls.querySelector("input").oninput=function(e){it.section=e.target.value===""?null:Number(e.target.value);save();render();};
    var lq=h('<label>Cant<input class="in" type="number" value="'+it.qty+'"></label>');lq.querySelector("input").oninput=function(e){it.qty=Number(e.target.value);save();};
    var del=h('<button class="del">✕</button>');del.onclick=function(){S.items.splice(i,1);save();render();};
    row.appendChild(la);row.appendChild(ls);row.appendChild(lq);row.appendChild(del);card.appendChild(row);
    var cr=h('<div class="client-row"><span class="client-lbl">Cliente</span></div>');
    ["A","B","C"].forEach(function(c){var b=h('<button class="client-btn">'+c+'</button>');if(it.client===c){b.style.background=CLIENT_COLORS[c];b.style.color="#1A1300";b.style.borderColor=CLIENT_COLORS[c];}b.onclick=function(){it.client=it.client===c?null:c;save();render();};cr.appendChild(b);});
    card.appendChild(cr);
    if(sp)card.appendChild(h('<div class="tag-sp">🔒 Recoger en caja — irá al final</div>'));
    main.appendChild(card);
  });
  var rb=h('<div class="row-btns"></div>');
  var ai=h('<button class="ghost sm">+ Item</button>');ai.onclick=function(){addBlank();render();};
  var vc=h('<button class="ghost sm">Vaciar pedido</button>');vc.onclick=function(){S.items=[];S.view="load";save();render();};
  rb.appendChild(ai);rb.appendChild(vc);main.appendChild(rb);
  var gen=h('<button class="big">Generar ruta</button>');gen.onclick=function(){set("view","route");};main.appendChild(gen);
}

function pickItem(it){var orig=S.items[it._i]||it;orig.status="picked";orig.done=true;save();showUndo(orig,"picked");}
function deleteItem(it){var orig=S.items[it._i]||it;orig.status="manual_delete";orig.done=false;save();showUndo(orig,"manual_delete");}
function showUndo(it,fromStatus){S.undoToast={it:it,from:fromStatus};render();
  clearTimeout(window._undoTimer);
  window._undoTimer=setTimeout(function(){if(S.undoToast&&S.undoToast.it===it){S.undoToast=null;render();}},4000);
}
function undoLast(){if(!S.undoToast)return;var it=S.undoToast.it;it.status="pending";it.done=false;S.undoToast=null;clearTimeout(window._undoTimer);save();render();}
function aisleCard(g,step){
  var z=ZONE_LABEL[zoneOf(g.prefix)]||"";
  var card=h('<div class="aisle'+(g.special?" sp":"")+'"></div>');
  card.appendChild(h('<div class="aisle-head"><div class="aisle-id"><span class="step-no">'+step+'</span><span class="aisle-code">'+esc(g.aisle)+'</span></div><div class="aisle-meta"><div class="zone">'+esc(z)+'</div><div class="count">'+g.items.length+' '+(g.items.length===1?"producto":"productos")+'</div></div></div>'));
  var box=h('<div></div>');
  g.items.forEach(function(it){
    var wrap=h('<div class="item-wrap"></div>');
    var row=h('<div class="item-row"></div>');
    var sub="";
    if(it.client)sub+='<em class="cl" style="background:'+CLIENT_COLORS[it.client]+';color:#1A1300">Cliente '+it.client+'</em>';
    if(it.section!=null)sub+='<em>Sec '+it.section+'</em>';
    if(it.qty>1)sub+='<em>×'+it.qty+'</em>';
    if(it.perishable)sub+='<em class="frio">frío</em>';
    row.innerHTML='<span class="check"></span><span class="item-body"><span class="item-name">'+esc(it.name)+'</span><span class="item-sub">'+sub+'</span></span>';
    wrap.appendChild(row);
    var acts=h('<div class="item-acts"></div>');
    var bp=h('<button class="act-btn pick">✓ Recogido</button>');bp.onclick=function(){pickItem(it);};
    var bd=h('<button class="act-btn rm">✕ Eliminar</button>');bd.onclick=function(){deleteItem(it);};
    acts.appendChild(bp);acts.appendChild(bd);wrap.appendChild(acts);
    box.appendChild(wrap);
  });
  card.appendChild(box);
  return card;
}

function renderRoute(main,normal,special,total,units){
  if(total===0){main.appendChild(h('<div class="empty">No hay items para rutear.</div>'));return;}
  var pendCount=normal.reduce(function(s,g){return s+g.items.length;},0)+special.reduce(function(s,g){return s+g.items.length;},0);
  main.appendChild(h('<div class="summary"><div><b>'+(normal.length+special.length)+'</b><span>aisles</span></div><div><b>'+pendCount+'</b><span>pendientes</span></div><div><b>'+units+'</b><span>unidades</span></div></div>'));
  if(pendCount===0){main.appendChild(h('<div class="empty">🎉 Todo recogido o gestionado.</div>'));}
  normal.forEach(function(g,i){main.appendChild(aisleCard(g,i+1));});
  if(special.length){main.appendChild(h('<div class="sp-head">🔒 Recoger en caja — al final</div>'));special.forEach(function(g,i){main.appendChild(aisleCard(g,normal.length+i+1));});}
  main.appendChild(h('<div class="foot">Salida por la puerta derecha →</div>'));
  var nb=h('<button class="ghost">Nuevo pedido</button>');nb.onclick=function(){S.items=[];S.view="load";save();render();};main.appendChild(nb);
}

function zoneCard(title,hint,items,icon){
  var c=h('<div class="zone-card"></div>');
  c.appendChild(h('<div class="zone-h"><span class="zone-icon">'+icon+'</span><div><div class="zone-title">'+title+'</div><div class="zone-hint">'+hint+'</div></div><div class="zone-n">'+items.length+'</div></div>'));
  if(!items.length){c.appendChild(h('<div class="zone-empty">—</div>'));}
  else{items.forEach(function(it){var cl=it.client?'<span class="cl" style="background:'+CLIENT_COLORS[it.client]+';color:#1A1300">'+it.client+'</span>':"";c.appendChild(h('<div class="zone-item">'+cl+'<span class="zone-name">'+esc(it.name)+'</span>'+(it.qty>1?'<span class="zone-qty">×'+it.qty+'</span>':"")+'</div>'));});}
  return c;
}
function renderCart(main,cart,clients,total){
  if(total===0){main.appendChild(h('<div class="empty">No hay items. Carga un pedido.</div>'));return;}
  var lead=cart.mode==="multi"?("Pedido de "+clients.length+" clientes ("+clients.join(", ")+"). El de más bulto va al área grande; el resto se reparte por tamaño."):(clients.length===0?"Un solo pedido. Reparto por tamaño/peso.":("Un cliente ("+clients.join(", ")+"). Reparto por tamaño/peso."));
  main.appendChild(h('<p class="lead">'+lead+'</p>'));
  main.appendChild(zoneCard("Área grande","Canasta principal",cart.zones.grande,"▣"));
  main.appendChild(zoneCard("Canasta pequeña","Cesta de arriba · chico / frágil",cart.zones.canasta,"▢"));
  main.appendChild(zoneCard("Rejilla inferior","Bandeja de abajo · pesado / voluminoso",cart.zones.rejilla,"▤"));
  main.appendChild(h('<p class="hint" style="margin-top:14px">El bulto se estima del tamaño en el nombre (lb, oz, fl oz, gallon, count) × cantidad. Es una guía.</p>'));
  var vb=h('<button class="ghost">Ver ruta</button>');vb.onclick=function(){set("view","route");};main.appendChild(vb);
}

render();
</script>
</body>
</html>
